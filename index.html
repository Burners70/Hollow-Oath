function resetRun() {
  score = 0; lives = 3; runSaved = 0; runLost = 0; runFired = 0;
  firedAtSecret = false; firedAtCombat = false;
  runFragments = 0; blackboxCount = 0; shrines = new Set();
  upgrades = {}; mercyBreach = null; mercyDamaged = false; endingType = null;
  clearCards = []; revealCard = null; surfaceCtx = null;
}

function toBriefing(n) {
  levelIdx = n;
  surfaceCtx = null;
  level = genLevel(n);
  spawnShip();
  camera = { x: ship.x, y: ship.y, shake: 0 };
  particles = []; texts = [];
  mercyBreach = null; mercyDamaged = false;
  state = "brief"; stateT = 0; briefChars = 0;
}

let bannerMsg = null;
function banner(str, color) { bannerMsg = { str, color, t: 2.6 }; }
function addText(x, y, str, color) { texts.push({ x, y, str, color, t: 1.6 }); }

function showCard(card) { revealCard = card; state = "reveal"; stateT = 0; }

function grantFragment(queueForClear) {
  if (runFragments >= FRAGMENTS.length) { score += 500; return null; }
  const frag = FRAGMENTS[runFragments++];
  if (queueForClear) level.fragmentsHere.push(frag);
  return frag;
}

function explode(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      t: 0.5 + Math.random() * 0.8, max: 1.3, color, size: 1.5 + Math.random() * 3 });
  }
  camera.shake = Math.min(camera.shake + 14, 26);
  // nearby grounded Scions panic
  if (level) for (const o of level.oids) {
    if ((o.state === "wait" || o.state === "walk") && Math.abs(o.x - x) < 160 && Math.abs(o.y - y) < 160) {
      o.state = "panic"; o.panicT = 1.6 + Math.random();
    }
  }
  boom();
}

function goldBurst(x, y) {
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2, sp = 30 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      t: 0.6 + Math.random() * 0.8, max: 1.4, color: "#ffd54f", size: 1.5 + Math.random() * 2.5 });
  }
}

/* ---------------- landing rules ---------------- */
function landingEval() {
  const s = ship;
  const slope = Math.abs(groundAt(s.x + 10) - groundAt(s.x - 10)) / 20;
  const tilt = Math.abs(((s.ang % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
  const upright = tilt < 0.5;
  const vyMax = upgrades.gentle ? 62 : 52;
  const soft = Math.abs(s.vy) < vyMax && Math.abs(s.vx) < 38 && slope < 0.25 && upright;
  const survivable = Math.abs(s.vy) < (upgrades.gentle ? 100 : 85) && Math.abs(s.vx) < 60 && slope < 0.35 && upright;
  let reason = "";
  if (!upright) reason = "LEVEL THE SHIP";
  else if (slope >= 0.25) reason = "GROUND TOO STEEP";
  else if (Math.abs(s.vy) >= vyMax) reason = "DESCENDING TOO FAST";
  else if (Math.abs(s.vx) >= 38) reason = "DRIFTING SIDEWAYS";
  return { soft, survivable, reason };
}

function shipDie() {
  if (ship.dead) return;
  ship.dead = true;
  explode(ship.x, ship.y, "#ff4081", 60);
  explode(ship.x, ship.y, "#ffc400", 40);
  if (ship.passengers.length > 0) {
    const n = ship.passengers.length;
    for (const p of ship.passengers) {
      p.state = "lost";
      if (p.role === "famous") {
        addText(ship.x, ship.y - 66, "YOU LOST " + FAMOUS[p.famousId].name, "#ffd54f");
      }
    }
    acctLevel().lost += n; runLost += n;
    const penalty = 250 * n;
    score = Math.max(0, score - penalty);
    addText(ship.x, ship.y - 50,
      n + (n === 1 ? " SCION LOST" : " SCIONS LOST") + "  -" + penalty, "#ff4081");
    explode(ship.x, ship.y - 12, "#69f0ae", 24);
    ship.passengers = [];
  }
  lives--;
  state = "dead"; stateT = 0;
}

/* When every Scion is accounted for (saved, lost, or contained), MERCY
   closes her manifest and spools the jump drive — she has been holding
   the Static off her systems the whole time, and the moment she stops
   stationkeeping to spool, it starts to reach her. The extraction dock
   is the sector's final exam: dock with a drifting mothership while
   the pulses quicken. Checked every play frame so no accounting path
   (delivery, crash, sabotage, quarantine, escape) can be missed. */
function checkSectorClear() {
  if (state !== "play" || level.isCave || level.isFinale || level.extraction || mercyBreach) return;
  if (level.delivered + level.lost + level.contained < level.total) return;
  level.extraction = { t: 0, pulseT: 0, hold: 0 };
  banner("MANIFEST CLOSED — MERCY IS SPOOLING TO JUMP\nDOCK IN THE RECOVERY BAY BEFORE THE STATIC REACHES HER", "#ffc400");
  blip(660, 220, 0.6, "sawtooth", 0.15);
}

function sectorClearNow() {
  score += 1000;
  if (level.firedShots === 0) score += 2000;
  bannerMsg = null;
  clearCards = level.fragmentsHere.map(f => ({
    kicker: "LOG FRAGMENT RECOVERED", title: "", body: f, color: "#00e5ff" }));
  state = "clear"; stateT = 0;
  blip(440, 1760, 0.5, "sine", 0.15);
}

function updateExtraction(dt) {
  const e = level.extraction;
  e.t += dt;
  // MERCY drifts harder the longer you take
  level.mxo = Math.sin(e.t * 0.55) * Math.min(60, 8 + e.t * 2.2);
  level.myo = Math.sin(e.t * 1.15) * Math.min(30, 5 + e.t * 1.1);
  // the Static surges in quickening pulses that shove your ship
  e.pulseT += dt;
  if (e.pulseT >= Math.max(2.8, 6.5 - e.t * 0.09)) {
    e.pulseT = 0;
    level.pulse = { t: 0 };
    staticTick();
    const { mx, my } = mercyPos();
    const dx = ship.x - mx, dy = ship.y - my, d = Math.hypot(dx, dy) || 1;
    if (d < 600 && !ship.landed && !ship.dead) {
      const kick = 110 * (1 - d / 600);
      ship.vx += dx / d * kick; ship.vy += dy / d * kick;
      camera.shake += 8;
      addText(ship.x, ship.y - 30, "THE STATIC SURGES", "#b388ff");
    }
  }
  if (level.pulse && (level.pulse.t += dt) > 1.2) level.pulse = null;
  if (!ship.dead && inBay(bayRects().med)) {
    e.hold += dt;
    if (e.hold >= 1.5) sectorClearNow();
  } else e.hold = 0;
}

function triggerBreach() {
  mercyBreach = { t: 45 };
  level.contamKnown = true;
  banner("SECURITY BREACH ABOARD MERCY\nDOCK AT THE RED BAY TO CONTAIN IT", "#ff4081");
  blip(880, 220, 0.6, "sawtooth", 0.2);
}

function resolveBreach(success) {
  mercyBreach = null;
  if (success) {
    score += 750;
    banner("CONTAMINANT CONTAINED  +750\nLOCKDOWN LIFTED", "#69f0ae");
    blip(520, 1040, 0.3, "sine", 0.15);
  } else {
    score = Math.max(0, score - 1000);
    mercyDamaged = true;
    banner("RECOVERY BAY SABOTAGED  -1000\nHEALING OFFLINE THIS SECTOR", "#ff4081");
    blip(300, 60, 0.6, "sawtooth", 0.2);
  }
}

/* ---------------- update ---------------- */
let ctlShown = null;
function updateCtlVisibility() {
  // virtual controls exist only in flight — not on the title, intro,
  // briefings, or story cards
  const want = state === "play" || state === "dead";
  if (want === ctlShown) return;
  ctlShown = want;
  document.body.classList.toggle("noctl", !want);
  if (!want) for (const b of btnEls) {
    input[b.key] = false;
    b.el.classList.remove("down");
  }
}

function update(dt) {
  stateT += dt;
  pollPad();
  updateCtlVisibility();
  if (bannerMsg && (bannerMsg.t -= dt) <= 0) bannerMsg = null;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t -= dt; if (p.t <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += GRAV * 0.6 * dt;
  }
  for (let i = texts.length - 1; i >= 0; i--) {
    texts[i].t -= dt; texts[i].y -= 24 * dt;
    if (texts[i].t <= 0) texts.splice(i, 1);
  }
  if (camera) camera.shake = Math.max(0, camera.shake - 60 * dt);

  // portrait: hold the game and show the rotate prompt instead
  if (vh > vw) {
    if (thrustGain) thrustGain.gain.value = 0;
    input.tap = false;
    return;
  }

  switch (state) {
    case "title": case "gameover": case "win": updateMenu(); return;
    case "intro": updateIntro(dt); return;
    case "help": case "codex":
      if (input.tap && stateT > 0.4) { state = "title"; stateT = 0.7; }
      input.tap = false; return;
    case "brief": updateBrief(dt); return;
    case "reveal":
      if (input.tap && stateT > 0.4) { revealCard = null; state = "play"; }
      input.tap = false; return;
    case "clear": updateClear(); return;
    case "ending":
      if (input.tap && stateT > 1) { state = "win"; stateT = 0; saveHi(); }
      input.tap = false; return;
    case "dead":
      if (stateT > 1.6) {
        if (lives <= 0) { state = "gameover"; stateT = 0; saveHi(); }
        else {
          if (level.isCave) exitCave();   // the Hollows spit you back out
          spawnShip(); state = "play"; stateT = 0; checkSectorClear();
        }
      }
      input.tap = false;
      return;
    case "play": updatePlay(dt); return;
  }
}

function saveHi() {
  if (score > hiscore) { hiscore = score; try { localStorage.setItem("doids_hi", hiscore); } catch (e) {} }
}

let introIdx = 0;
function updateMenu() {
  if (input.tap && stateT > 0.6) {
    if (state === "title" && inRect(assistRect(), input.tapX, input.tapY)) {
      assist = !assist;
      try { localStorage.setItem("doids_assist", assist ? "1" : "0"); } catch (e) {}
      blip(assist ? 440 : 300, assist ? 660 : 200, 0.12, "sine", 0.1);
    } else if (state === "title" && inRect(helpRect(), input.tapX, input.tapY)) {
      state = "help"; stateT = 0;
      blip(440, 660, 0.1, "sine", 0.08);
    } else if (state === "title" && inRect(codexRect(), input.tapX, input.tapY)) {
      state = "codex"; stateT = 0;
      blip(550, 825, 0.1, "sine", 0.08);
    } else if (state === "title" && inRect(storyRect(), input.tapX, input.tapY)) {
      // rewatch the opening narrative (it flows into a new run)
      goFullscreen();
      if (window.hideA2HS) window.hideA2HS();
      resetRun();
      introIdx = 0;
      state = "intro"; stateT = 0;
      blip(330, 660, 0.2, "sine", 0.1);
    } else {
      goFullscreen();
      if (window.hideA2HS) window.hideA2HS();
      resetRun();
      if (introSeen) {
        toBriefing(0);   // veterans launch straight into the tasking
      } else {
        introIdx = 0;
        state = "intro"; stateT = 0;
      }
      blip(330, 660, 0.2, "sine", 0.1);
    }
  }
  input.tap = false;
}

let introBeat = 0;
function updateIntro(dt) {
  // a slow heartbeat under the story — except the failure panel,
  // where the Static answers instead
  introBeat += dt;
  const cyc = introIdx === 3 ? 1.4 : 1.5;
  if (introBeat >= cyc) {
    introBeat = 0;
    if (introIdx === 3) staticTick(); else heartbeat(0.55);
  }
  if (input.tap && stateT > 0.35) {
    if (inRect(skipRect(), input.tapX, input.tapY)) { markIntroSeen(); toBriefing(0); }
    else {
      introIdx++; stateT = 0;
      blip(440, 550, 0.08, "sine", 0.07);
      if (introIdx >= INTRO.length) { markIntroSeen(); toBriefing(0); }
    }
  }
  input.tap = false;
}

function updateBrief(dt) {
  const full = BRIEFS[levelIdx].length;
  briefChars = Math.min(full, briefChars + dt * 55);
  if (input.tap && stateT > 0.5) {
    if (briefChars < full) briefChars = full;
    else { state = "play"; stateT = 0; banner(SECTOR_NAMES[levelIdx], "#00e5ff"); }
  }
  input.tap = false;
}

function updateClear() {
  if (input.tap && stateT > 0.8) {
    if (clearCards.length > 0) { clearCards.shift(); stateT = Math.max(stateT, 0.81); }
    else if (levelIdx < FINALE_IDX - 1) toBriefing(levelIdx + 1);
    else if (levelIdx === FINALE_IDX - 1) {
      if (blackboxCount >= 3) toBriefing(FINALE_IDX);
      else { endingType = "unresolved"; state = "ending"; stateT = 0; }
    } else { state = "ending"; stateT = 0; }
  }
  input.tap = false;
}

function updatePlay(dt) {
  input.tap = false;
  const s = ship;
  const now = performance.now() / 1000;

  let steer = 0;
  if (input.left || pad.left) steer -= 1;
  if (input.right || pad.right) steer += 1;
  if (steer === 0) steer = gyroSteerVal();
  if (steer) s.ang += ROT * dt * steer;

  if (assist && !s.landed && !steer) {
    const tilt = ((s.ang % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
    if (Math.abs(tilt) < ASSIST_CAPTURE) s.ang = tilt * Math.max(0, 1 - ASSIST_RATE * dt);
  }

  // force field: eats fuel, stops bullets, drones, rough ground and cave roofs
  s.shield = (input.shield || pad.shield) && s.fuel > 0 && !s.dead;
  if (s.shield) s.fuel = Math.max(0, s.fuel - 7 * dt);

  const thrusting = (input.thrust || pad.thrust) && s.fuel > 0;
  if (thrustGain) thrustGain.gain.value = thrusting ? 0.14 : 0;
  if (thrusting) {
    s.vx += Math.sin(s.ang) * THRUST * dt;
    s.vy -= Math.cos(s.ang) * THRUST * dt;
    s.fuel = Math.max(0, s.fuel - 5.2 * dt);
    s.landed = false;
    for (let i = 0; i < 2; i++) {
      const spread = (Math.random() - 0.5) * 0.5;
      particles.push({
        x: s.x - Math.sin(s.ang) * 12, y: s.y + Math.cos(s.ang) * 12,
        vx: s.vx - Math.sin(s.ang + spread) * 160, vy: s.vy + Math.cos(s.ang + spread) * 160,
        t: 0.25 + Math.random() * 0.2, max: 0.45,
        color: Math.random() < 0.5 ? "#ffc400" : "#ff6d00", size: 2 + Math.random() * 2
      });
    }
    // friendly fire: hovering your exhaust over someone is malpractice
    const exX = s.x - Math.sin(s.ang) * 16, exY = s.y + Math.cos(s.ang) * 16;
    for (const o of level.oids) {
      if ((o.state === "wait" || o.state === "walk" || o.state === "panic") &&
          Math.abs(o.x - exX) < 26 && o.y - exY > -6 && o.y - exY < 46) {
        o.scorch = (o.scorch || 0) + dt * 2.2;
        if (o.scorch > 0.5) killOid(o, "torched");
      } else if (o.scorch) o.scorch = Math.max(0, o.scorch - dt);
    }
  }

  // gravity anomalies pull the ship toward their centres
  for (const a of level.anomalies) {
    const dx = a.x - s.x, dy = a.y - s.y, d = Math.hypot(dx, dy);
    if (d < a.r && d > 1 && !s.landed) {
      const f = a.str * (1 - d / a.r);
      s.vx += dx / d * f * dt; s.vy += dy / d * f * dt;
    }
  }

  if (!s.landed) {
    s.vy += GRAV * dt;
    s.x += s.vx * dt; s.y += s.vy * dt;
  }

  s.x = clamp(s.x, 40, level.W - 40);
  if (s.y < 20) { s.y = 20; s.vy = Math.max(s.vy, 0); }

  // cave roofs are unforgiving — unless the field is up
  if (level.roof && !s.dead && !s.landed) {
    const rY = roofAt(s.x);
    if (s.y - SHIP_R <= rY) {
      if (s.shield) {
        s.y = rY + SHIP_R + 1;
        s.vy = Math.abs(s.vy) * 0.5 + 20;
        s.fuel = Math.max(0, s.fuel - 4);
        camera.shake += 6;
        blip(240, 420, 0.12, "sine", 0.1);
      } else { shipDie(); return; }
    }
  }

  const g = groundAt(s.x);
  if (!s.landed && s.y + SHIP_R >= g) {
    const { soft, survivable } = landingEval();
    if (soft) {
      s.landed = true; s.y = g - SHIP_R; s.vx = 0; s.vy = 0; s.ang = 0;
    } else if (s.shield) {
      // the force field turns a bad approach into a bounce
      s.y = g - SHIP_R;
      s.vy = -Math.abs(s.vy) * 0.45; s.vx *= 0.65;
      s.fuel = Math.max(0, s.fuel - 4);
      camera.shake += 6;
      addText(s.x, s.y - 30, "SHIELD BOUNCE", "#69f0ae");
      blip(200, 380, 0.15, "sine", 0.12);
    } else if (survivable) {
      s.landed = true; s.y = g - SHIP_R; s.vx = 0; s.vy = 0; s.ang = 0;
      const dmg = upgrades.gentle ? 12 : 35;
      s.vitals -= dmg; camera.shake += 10;
      addText(s.x, s.y - 30, "HARD LANDING -" + dmg, "#ff4081");
      blip(160, 40, 0.3, "sawtooth", 0.2);
      if (s.vitals <= 0) { shipDie(); return; }
    } else { shipDie(); return; }
  }

  updateOids(dt, now);
  updateEnemies(dt);
  updateSabotage(dt);
  updateDocking(dt);
  updateBlackbox(dt);
  updatePods();
  updateLift(dt);
  updateShrine(dt);
  if (level.isFinale) updateBeacon(dt);

  if (mercyBreach) {
    mercyBreach.t -= dt;
    if (mercyBreach.t <= 0) resolveBreach(false);
  }

  if (level.extraction && state === "play") updateExtraction(dt);
  checkSectorClear();

  s.beat = Math.max(0, s.beat - dt);
  camera.x = lerp(camera.x, s.x + s.vx * 0.35, 1 - Math.pow(0.001, dt));
  camera.y = lerp(camera.y, s.y + s.vy * 0.2 - 40, 1 - Math.pow(0.001, dt));
}

function updateOids(dt, now) {
  const s = ship;
  for (const o of level.oids) {
    o.wave += dt;
    if (o.state === "dying") {
      o.deathT += dt;
      if (o.deathType === "torched") {
        // staggering about in flames
        o.x += Math.sin(o.deathT * 22) * 44 * dt;
        o.y = groundAt(o.x);
        if (Math.random() < 0.6) particles.push({
          x: o.x + (Math.random() - 0.5) * 8, y: o.y - 12 - Math.random() * 12,
          vx: (Math.random() - 0.5) * 30, vy: -50 - Math.random() * 40,
          t: 0.4, max: 0.5,
          color: Math.random() < 0.5 ? "#ffc400" : "#ff6d00", size: 2.5 });
      }
      if (o.deathT >= 1.3) {
        o.state = "lost";
        level.lost++; runLost++;
        const fam = o.role === "famous";
        const pen = fam ? 500 : 250;
        score = Math.max(0, score - pen);
        addText(o.x, o.y - 40,
          (fam ? "YOU KILLED " + FAMOUS[o.famousId].name : "MALPRACTICE") + "  -" + pen,
          fam ? "#ffd54f" : "#ff4081");
        explode(o.x, o.y - 8, o.deathType === "torched" ? "#ff6d00" : "#69f0ae", 18);
      }
      continue;
    }
    if (o.state === "wait") {
      o.nearShip = Math.abs(s.x - o.x) < 240 && Math.abs(s.y - o.y) < 180;
      if (o.persona === "pace") {
        o.x = o.home + Math.sin((now + o.wave * 3) * 0.7) * 26;
        o.y = groundAt(o.x);
      }
    }
    if (o.state === "panic") {
      o.panicT -= dt;
      o.x += Math.sin(now * 7 + o.wave * 9) * 60 * dt;
      o.x = clamp(o.x, o.home - 70, o.home + 70);
      o.y = groundAt(o.x);
      if (o.panicT <= 0) o.state = "wait";
      continue;
    }
    if (o.state === "wait" && s.landed &&
        Math.abs(s.x - o.x) < 150 && Math.abs(groundAt(o.x) - (s.y + SHIP_R)) < 60) {
      o.state = "walk";
    }
    if (o.state === "walk") {
      if (!s.landed) { o.state = "wait"; continue; }
      const speed = o.role === "saboteur" ? 40 : 34; // a touch too eager
      o.x += Math.sign(s.x - o.x) * speed * dt;
      o.y = groundAt(o.x);
      if (Math.abs(s.x - o.x) < 14) {
        if (s.passengers.length >= CAPACITY) {
          addText(s.x, s.y - 34, "SHIP FULL", "#ffc400");
          o.state = "wait"; o.x = s.x + 20 * Math.sign(o.x - s.x || 1);
          continue;
        }
        o.state = "aboard";
        s.passengers.push(o);
        score += 500;
        s.beat = 1;
        if (o.role === "saboteur") {
          dullThud(); // no heartbeat. Listen closely.
          o.sabT = 6 + Math.random() * 3;
          addText(s.x, s.y - 34, "SCION ABOARD +500", "#69f0ae");
        } else {
          heartbeat();
          addText(s.x, s.y - 34, "SCION ABOARD +500", "#69f0ae");
          if (o.carrier) addText(s.x, s.y - 48, "◇ CARRYING DATA", "#00e5ff");
          if (o.role === "famous") {
            goldBurst(s.x, s.y - 10);
            banner("SOMEONE EXTRAORDINARY IS ABOARD…", "#ffd54f");
            blip(660, 1320, 0.3, "sine", 0.12);
          }
        }
      }
    }
  }
}

function updateEnemies(dt) {
  const s = ship;
  for (const t of level.turrets) {
    if (!t.alive) continue;
    const dx = s.x - t.x, dy = s.y - (t.y - 10);
    const d = Math.hypot(dx, dy);
    const target = Math.atan2(dy, dx);
    t.ang += clamp(target - t.ang, -1.6 * dt, 1.6 * dt);
    t.cd -= dt;
    if (d < 500 && t.cd <= 0 && !s.dead) {
      t.cd = 1.5 + Math.random() * 0.9;
      level.bullets.push({ x: t.x + Math.cos(t.ang) * 14, y: t.y - 10 + Math.sin(t.ang) * 14,
        vx: Math.cos(t.ang) * 150, vy: Math.sin(t.ang) * 150, t: 4 });
      blip(300, 90, 0.18, "square", 0.07);
    }
  }

  for (const dr of level.drones) {
    if (!dr.alive) continue;
    dr.bob += dt;
    const dx = s.x - dr.x, dy = s.y - dr.y, d = Math.hypot(dx, dy) || 1;
    if (d < 700) { dr.vx += dx / d * 60 * dt; dr.vy += dy / d * 60 * dt; }
    const sp = Math.hypot(dr.vx, dr.vy);
    if (sp > 95) { dr.vx *= 95 / sp; dr.vy *= 95 / sp; }
    dr.x += dr.vx * dt; dr.y += dr.vy * dt + Math.sin(dr.bob * 3) * 8 * dt;
    dr.y = Math.min(dr.y, groundAt(dr.x) - 26);
    if (level.roof) dr.y = Math.max(dr.y, roofAt(dr.x) + 26);
    if (!s.dead && d < SHIP_R + (s.shield ? 14 : 10)) {
      dr.alive = false;
      explode(dr.x, dr.y, "#ff4081", 24);
      if (s.shield) {
        addText(s.x, s.y - 30, "SHIELD HELD", "#69f0ae");
      } else {
        s.vitals -= 40;
        addText(s.x, s.y - 30, "-40", "#ff4081");
        if (s.vitals <= 0) { shipDie(); return; }
      }
    }
  }

  for (let i = level.bullets.length - 1; i >= 0; i--) {
    const b = level.bullets[i];
    b.t -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.t <= 0 || b.y > groundAt(b.x)) { level.bullets.splice(i, 1); continue; }
    if (!s.dead && Math.hypot(b.x - s.x, b.y - s.y) < SHIP_R + (s.shield ? 10 : 3)) {
      level.bullets.splice(i, 1);
      if (s.shield) {
        explode(b.x, b.y, "#69f0ae", 8);
        blip(500, 900, 0.08, "sine", 0.08);
        continue;
      }
      s.vitals -= 26; camera.shake += 8;
      explode(b.x, b.y, "#ff4081", 10);
      addText(s.x, s.y - 30, "-26", "#ff4081");
      if (s.vitals <= 0) { shipDie(); return; }
    }
  }

  s.fireCd -= dt;
  if ((input.fire || pad.fire) && s.fireCd <= 0 && !s.dead) {
    s.fireCd = 0.22;
    acctLevel().firedShots++; runFired++;
    level.shots.push({ x: s.x + Math.sin(s.ang) * 14, y: s.y - Math.cos(s.ang) * 14,
      vx: s.vx + Math.sin(s.ang) * 360, vy: s.vy - Math.cos(s.ang) * 360, t: 1.3 });
    blip(880, 180, 0.12, "square", 0.09);
  }
  for (let i = level.shots.length - 1; i >= 0; i--) {
    const b = level.shots[i];
    b.t -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
    let gone = b.t <= 0 || b.y > groundAt(b.x) || (level.roof && b.y < roofAt(b.x));
    for (const t of level.turrets) {
      if (t.alive && Math.hypot(b.x - t.x, b.y - (t.y - 8)) < 18) {
        t.alive = false; gone = true; firedAtCombat = true;
        score += 250;
        explode(t.x, t.y - 8, "#ffc400", 30);
        addText(t.x, t.y - 40, "+250", "#ffc400");
      }
    }
    for (const dr of level.drones) {
      if (dr.alive && Math.hypot(b.x - dr.x, b.y - dr.y) < 16) {
        dr.alive = false; gone = true; firedAtCombat = true;
        score += 150;
        explode(dr.x, dr.y, "#ff4081", 22);
        addText(dr.x, dr.y - 30, "+150", "#ff4081");
      }
    }
    // friendly fire: a stray shot can hit the very Scion you came for
    for (const o of level.oids) {
      if ((o.state === "wait" || o.state === "walk" || o.state === "panic") &&
          Math.hypot(b.x - o.x, b.y - (o.y - 12)) < 12) {
        gone = true;
        killOid(o, "shot");
      }
    }
    // Glycon's secrets crack open under fire
    for (const sc of level.scenery) {
      if (sc.dead) continue;
      if (sc.fake && Math.hypot(b.x - sc.x, b.y - (sc.y - 30 * sc.s)) < 24 * sc.s) {
        sc.dead = true; gone = true; firedAtSecret = true;
        score += 500;
        explode(sc.x, sc.y - 24, "#c6ff00", 26);
        staticTick();
        addText(sc.x, sc.y - 56, "LURE-TREE DESTROYED — GLYCON TRANSMITTER +500", "#c6ff00");
      } else if (sc.hollow && Math.hypot(b.x - sc.x, b.y - (sc.y - 8 * sc.s)) < 16 * sc.s) {
        sc.dead = true; gone = true; firedAtSecret = true;
        score += 400;
        explode(sc.x, sc.y - 8, "#ffc400", 20);
        level.pods.push({ x: sc.x, y: sc.y, taken: false, ph: Math.random() * 7 });
        addText(sc.x, sc.y - 44, "HIDDEN CACHE +400 — stashed away from the serpent", "#ffc400");
        blip(400, 1200, 0.3, "sine", 0.12);
      }
    }
    if (level.beacon && !level.beacon.resolved &&
        Math.hypot(b.x - level.beacon.x, b.y - (level.beacon.y - 40)) < 42) {
      gone = true;
      level.beacon.hp--;
      explode(level.beacon.x, level.beacon.y - 40, "#b388ff", 20);
      if (level.beacon.hp <= 0) resolveBeacon("fire");
    }
    if (gone) level.shots.splice(i, 1);
  }
}

function updateSabotage(dt) {
  const s = ship;
  for (const p of s.passengers) {
    if (p.role !== "saboteur" || p.sleeper) continue;
    p.sabT -= dt;
    if (p.sabT > 0) continue;
    p.sabT = 7 + Math.random() * 4;
    acctLevel().contamKnown = true;
    level.contamKnown = true;
    // Jenner's gift: immunised passengers can't be killed, only inconvenienced
    if (upgrades.inoculation || Math.random() < 0.55 || s.passengers.length === 1) {
      s.fuel = Math.max(0, s.fuel - 9);
      addText(s.x, s.y - 34, "FUEL LINE CUT", "#ff4081");
      blip(140, 60, 0.25, "sawtooth", 0.12);
    } else {
      const victims = s.passengers.filter(q => q.role !== "saboteur");
      if (victims.length) {
        const v = victims[Math.floor(Math.random() * victims.length)];
        s.passengers.splice(s.passengers.indexOf(v), 1);
        v.state = "lost";
        acctLevel().lost++; runLost++;
        if (v.role === "famous")
          addText(s.x, s.y - 48, FAMOUS[v.famousId].name + " WAS KILLED", "#ffd54f");
        addText(s.x, s.y - 34, "PASSENGER KILLED BY SABOTEUR", "#ff4081");
        dullThud();
        checkSectorClear();
      }
    }
  }
}

function contaminantAboard() {
  return ship.passengers.some(p => p.role === "saboteur" && !p.sleeper);
}

function killOid(o, how) {
  if (o.state === "dying") return;
  o.state = "dying"; o.deathType = how; o.deathT = 0;
  if (how === "torched") blip(220, 60, 0.5, "sawtooth", 0.15);
  else blip(400, 80, 0.25, "square", 0.12);
}

/* recovery bay (cyan) spans MERCY's underside and heals & delivers;
   the red quarantine bay hangs off her starboard side */
function mercyPos() {
  return { mx: level.mx + (level.mxo || 0), my: level.my + (level.myo || 0) };
}
function bayRects() {
  const { mx, my } = mercyPos();
  return {
    med: { x0: mx - 115, x1: mx + 115, y0: my + 24, y1: my + 134 },
    red: { x0: mx + 150, x1: mx + 250, y0: my + 24, y1: my + 134 }
  };
}
function inBay(b) {
  const s = ship;
  return s.x > b.x0 && s.x < b.x1 && s.y > b.y0 && s.y < b.y1 &&
    Math.abs(s.vx) < 70 && Math.abs(s.vy) < 70 && !s.dead;
}

function updateDocking(dt) {
  if (level.isCave) return;   // no MERCY down in the Hollows
  const s = ship;
  const bays = bayRects();

  if (inBay(bays.med)) {
    if (!mercyBreach) {
      s.fuel = Math.min(100, s.fuel + 30 * dt);
      if (!mercyDamaged) {
        const rate = upgrades.lamp ? 40 : 24; // Nightingale runs a better ward
        s.vitals = Math.min(maxVitals(), s.vitals + rate * dt);
      }
    }
    s.dockT += dt;
    const deliverable = s.passengers.filter(p => p.role !== "saboteur");
    if (deliverable.length > 0 && s.dockT > 0.35) {
      s.dockT = 0; s.escapeT = 0;
      // famous Scions step out last, for the reveal
      deliverable.sort((a, b) => (a.role === "famous" ? 1 : 0) - (b.role === "famous" ? 1 : 0));
      const p = deliverable[0];
      s.passengers.splice(s.passengers.indexOf(p), 1);
      p.state = "delivered";
      level.delivered++; runSaved++;
      score += 300;
      addText(level.mx, level.my + 40, "DELIVERED +300", "#69f0ae");
      blip(520, 1040, 0.2, "sine", 0.12);
      if (p.carrier) {
        const frag = grantFragment(true);
        if (frag) addText(level.mx, level.my + 56, "LOG FRAGMENT RECOVERED", "#00e5ff");
      }
      if (p.role === "famous") {
        const f = FAMOUS[p.famousId];
        upgrades[f.upgrade] = true;
        codex.add(p.famousId); saveCodex();
        if (f.upgrade === "fabrica") s.vitals = Math.min(maxVitals(), s.vitals + 25);
        score += 1500;
        goldBurst(level.mx, level.my + 40);
        showCard({
          kicker: "RESCUED · +1500", title: f.name, subtitle: f.era,
          body: f.story + "\n\n★ " + f.upgradeName + " — " + f.upgradeDesc,
          color: "#ffd54f"
        });
        return;
      }
      checkSectorClear();
      return;
    }
    // only saboteurs left aboard: given the chance, one slips inside
    if (deliverable.length === 0 && s.passengers.length > 0) {
      s.escapeT += dt;
      if (s.escapeT > 1.2) {
        s.escapeT = 0;
        const sab = s.passengers.find(p => p.role === "saboteur");
        s.passengers.splice(s.passengers.indexOf(sab), 1);
        sab.state = "escaped";
        level.contained++; // off the manifest either way
        triggerBreach();
      }
    }
  } else { s.dockT = 0; s.escapeT = 0; }

  if (inBay(bays.red)) {
    s.redDockT += dt;
    const sab = s.passengers.find(p => p.role === "saboteur");
    if (sab && s.redDockT > 0.35) {
      s.redDockT = 0;
      s.passengers.splice(s.passengers.indexOf(sab), 1);
      sab.state = "contained";
      level.contained++; // accounted for, but not a casualty
      score += 750;
      addText(level.mx, level.my + 40, "CONTAMINANT CONTAINED +750", "#ff4081");
      explode(level.mx + 65, level.my + 60, "#ff4081", 14);
      blip(220, 660, 0.3, "square", 0.12);
      checkSectorClear();
    }
    if (mercyBreach) {
      s.breachDockT += dt;
      if (s.breachDockT > 2) { s.breachDockT = 0; resolveBreach(true); }
    }
  } else { s.breachDockT = 0; s.redDockT = 0; }
}

function updateBlackbox(dt) {
  const bb = level.blackbox;
  if (!bb || bb.found) return;
  const s = ship;
  if (s.landed && Math.abs(s.x - bb.x) < 70) {
    bb.scanT += dt;
    if (bb.scanT >= 1.5) {
      bb.found = true;
      blackboxCount++;
      score += 800;
      blip(300, 1200, 0.5, "sine", 0.14);
      const frag = grantFragment(false);
      showCard({
        kicker: "BLACK BOX RECOVERED · SIGNAL " + blackboxCount + "/" + NBOX + " · +800",
        title: "", subtitle: "",
        body: (frag || "The recorder is blank — wiped clean. Someone got here first.") +
          "\n\n" + (blackboxCount >= 3 ? "◈ Triangulation viable. Keep flying."
                                       : "◈ Recover at least 3 of " + NBOX + " to triangulate the source."),
        color: "#b388ff"
      });
    }
  } else bb.scanT = 0;
}

function updatePods() {
  const s = ship;
  for (const p of level.pods) {
    if (p.taken) continue;
    if (Math.hypot(s.x - p.x, s.y - (p.y - 8)) < 30) {
      p.taken = true;
      s.fuel = Math.min(100, s.fuel + 35);
      addText(p.x, p.y - 30, "FUEL +35", "#ffc400");
      blip(520, 780, 0.15, "sine", 0.1);
      goldBurst(p.x, p.y - 8);
    }
  }
  // the counterfeits: they drink instead of pour
  for (const p of level.fakePods) {
    if (p.taken) continue;
    if (Math.hypot(s.x - p.x, s.y - (p.y - 8)) < 30) {
      p.taken = true;
      s.fuel = Math.max(0, s.fuel - 18);
      score = Math.max(0, score - 100);
      addText(p.x, p.y - 30, "COUNTERFEIT — GLYCON'S LURE  -100", "#c6ff00");
      addText(p.x, p.y - 46, "FUEL DRAINED -18", "#ff4081");
      staticTick();
      explode(p.x, p.y - 8, "#c6ff00", 14);
    }
  }
}

/* ---- the secret lifts and what waits below ---- */
function updateLift(dt) {
  const L = level.lift;
  if (!L) return;
  if (mercyBreach || level.extraction) { L.holdT = 0; return; }
  const near = ship.landed && !ship.dead &&
    Math.abs(ship.x - L.x) < 46 && Math.abs((ship.y + SHIP_R) - L.y) < 24;
  if (!near) { L.holdT = 0; L.armed = true; return; }
  if (!L.armed) return;   // must lift off the pad once before it cycles again
  L.holdT += dt;
  if (L.holdT > 0.6 && !L.hinted) {
    L.hinted = true;
    addText(L.x, L.y - 44, "THE PAD RINGS HOLLOW…", "#b388ff");
    blip(180, 120, 0.3, "sine", 0.1);
  }
  if (L.holdT >= 2.4) {
    if (level.isCave) exitCave();
    else enterCave(L);
  }
}

function updateShrine(dt) {
  const sh = level.shrine;
  if (!sh || sh.found) return;
  if (ship.landed && Math.abs(ship.x - sh.x) < 80) {
    sh.scanT += dt;
    if (sh.scanT >= 2) {
      sh.found = true;
      shrines.add(level.caveIdx);
      score += 1000;
      let extra = "";
      if (shrines.size >= SHRINES.length) {
        score += 3000;
        extra = "\n\n★ GLYCON UNMASKED — the whole counterfeit laid bare. +3000";
      }
      const c = SHRINES[level.caveIdx];
      blip(300, 1200, 0.6, "sine", 0.14);
      staticTick();
      showCard({ kicker: c.kicker + " · SECRET +1000", title: c.title, subtitle: "",
        body: c.body + extra, color: c.color });
    }
  } else sh.scanT = 0;
}

function updateBeacon(dt) {
  const b = level.beacon;
  if (!b || b.resolved) return;
  const s = ship;
  if (s.landed && Math.abs(s.x - b.x) < 90) {
    b.silenceT += dt;
    if (b.silenceT >= 5) resolveBeacon("answered");
  } else b.silenceT = Math.max(0, b.silenceT - dt * 2);
}

function resolveBeacon(how) {
  const b = level.beacon;
  b.resolved = true;
  endingType = how;
  if (how === "fire") {
    score += 3000;
    explode(b.x, b.y - 40, "#b388ff", 80);
    explode(b.x, b.y - 20, "#ffc400", 50);
  } else {
    score += 6000;
    if (runFired === 0) score += 2000;
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: b.x, y: b.y - 40, vx: Math.cos(a) * 90, vy: Math.sin(a) * 90 - 30,
        t: 1 + Math.random(), max: 2, color: "#aef4ff", size: 2 });
    }
    blip(220, 880, 1.2, "sine", 0.15);
  }
  state = "ending"; stateT = 0;
}

/* ================= render ================= */
function zoomLevel() {
  return clamp(Math.min((vw - saLeft) / 900, vh / 640), 0.55, 1);
}

function render() {
  const now = performance.now() / 1000;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const bg = ctx.createLinearGradient(0, 0, 0, vh);
  bg.addColorStop(0, "#05060f"); bg.addColorStop(0.7, "#0a0d22"); bg.addColorStop(1, "#101433");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, vw, vh);

  if (vh > vw) { drawPortraitWarning(now); return; }
  if (state === "brief") { drawBrief(now); return; }
  if (state === "intro") { drawIntroScreen(now); return; }

  if (level) drawWorld(now);

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (state === "play" || state === "dead" || state === "reveal" || state === "clear") drawHUD(now);

  if (state === "title") drawTitle(now);
  if (state === "help") drawCardPanel(HELP_CARD, now);
  if (state === "codex") drawCodex(now);
  if (state === "reveal" && revealCard) drawCardPanel(revealCard, now);
  if (state === "clear") drawClear(now);
  if (state === "ending") drawEnding(now);
  if (state === "gameover") {
    drawCenter("FLATLINE", "GAME OVER — " + tallyLine() + "\ntap to try again", "#ff4081");
  }
  if (state === "win") drawWin();

  if (bannerMsg && (state === "play" || state === "dead")) {
    ctx.textAlign = "center";
    ctx.font = "800 22px 'Helvetica Neue', Arial, sans-serif";
    ctx.shadowColor = bannerMsg.color; ctx.shadowBlur = 18;
    ctx.fillStyle = bannerMsg.color;
    ctx.globalAlpha = clamp(bannerMsg.t, 0, 1);
    bannerMsg.str.split("\n").forEach((l, i) => ctx.fillText(l, vw / 2, vh * 0.26 + i * 28));
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
}

function worldTransform() {
  const z = zoomLevel();
  // the visible viewport starts right of the camera lozenge
  const cw = (vw - saLeft) / z, ch = vh / z;
  let cx = clamp(camera.x - cw / 2, 0, Math.max(0, level.W - cw));
  let cy = clamp(camera.y - ch / 2, -100, WORLD_H - ch);
  if (camera.shake > 0) {
    cx += (Math.random() - 0.5) * camera.shake;
    cy += (Math.random() - 0.5) * camera.shake;
  }
  return { z, cx, cy };
}

function drawWorld(now) {
  const { z, cx, cy } = worldTransform();
  ctx.setTransform(dpr * z, 0, 0, dpr * z, (saLeft - cx * z) * dpr, -cy * dpr * z);

  if (!level.isCave) {
    ctx.save();
    ctx.translate(cx * 0.35, cy * 0.35);
    for (const st of stars) {
      const a = 0.4 + 0.6 * Math.abs(Math.sin(now * 0.8 + st.tw));
      ctx.fillStyle = "rgba(200,220,255," + a.toFixed(2) + ")";
      ctx.fillRect(st.x, st.y, st.s, st.s);
    }
    ctx.restore();
  }

  // terrain
  ctx.beginPath();
  ctx.moveTo(0, WORLD_H + 100);
  for (let i = 0; i < level.heights.length; i++) ctx.lineTo(i * STEP, level.heights[i]);
  ctx.lineTo(level.W, WORLD_H + 100);
  ctx.closePath();
  const tg = ctx.createLinearGradient(0, 700, 0, WORLD_H);
  tg.addColorStop(0, "#1b1040"); tg.addColorStop(1, "#0c0820");
  ctx.fillStyle = tg; ctx.fill();
  ctx.shadowColor = "#7c4dff"; ctx.shadowBlur = 12;
  ctx.strokeStyle = "#b388ff"; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0;

  // cave roof, hanging overhead
  if (level.roof) {
    ctx.beginPath();
    ctx.moveTo(0, -160);
    for (let i = 0; i < level.roof.length; i++) ctx.lineTo(i * STEP, level.roof[i]);
    ctx.lineTo(level.W, -160);
    ctx.closePath();
    const rg = ctx.createLinearGradient(0, 500, 0, 1100);
    rg.addColorStop(0, "#0c0820"); rg.addColorStop(1, "#1b1040");
    ctx.fillStyle = rg; ctx.fill();
    ctx.shadowColor = "#7c4dff"; ctx.shadowBlur = 12;
    ctx.strokeStyle = "#b388ff"; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
  }

  drawScenery(now);

  // anomalies
  for (const a of level.anomalies) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(now * 0.4 + a.spin);
    ctx.strokeStyle = "rgba(179,136,255,.35)";
    ctx.shadowColor = "#b388ff"; ctx.shadowBlur = 10;
    ctx.setLineDash([10, 14]);
    for (let r = a.r; r > 40; r -= a.r / 3) {
      ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  if (!level.isCave) drawMothership(now);
  drawLift(now);
  if (level.shrine) drawShrine(now);

  // fuel pods — real ones flicker like fire, alive and irregular
  for (const p of level.pods) {
    if (p.taken) continue;
    ctx.save();
    ctx.translate(p.x, p.y - 8);
    ctx.globalAlpha = 0.72 + 0.28 * Math.abs(Math.sin(now * 2.7 + (p.ph || 0)) * Math.sin(now * 1.3 + (p.ph || 0) * 2));
    ctx.shadowColor = "#ffc400"; ctx.shadowBlur = 10;
    ctx.strokeStyle = "#ffc400"; ctx.lineWidth = 2;
    ctx.fillStyle = "rgba(255,196,0,.15)";
    ctx.beginPath(); ctx.rect(-5, -7, 10, 14); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3, -7); ctx.lineTo(-3, -10); ctx.moveTo(3, -7); ctx.lineTo(3, -10); ctx.stroke();
    ctx.restore();
  }
  // counterfeits — every lure blinks in perfect, mechanical unison
  for (const p of level.fakePods) {
    if (p.taken) continue;
    ctx.save();
    ctx.translate(p.x, p.y - 8);
    ctx.globalAlpha = Math.sin(now * Math.PI * 2) > 0 ? 1 : 0.38;
    const known = upgrades.canon;
    ctx.shadowColor = known ? "#c6ff00" : "#ffc400"; ctx.shadowBlur = 10;
    ctx.strokeStyle = known ? "#c6ff00" : "#ffc400"; ctx.lineWidth = 2;
    ctx.fillStyle = known ? "rgba(198,255,0,.15)" : "rgba(255,196,0,.15)";
    ctx.beginPath(); ctx.rect(-5, -7, 10, 14); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3, -7); ctx.lineTo(-3, -10); ctx.moveTo(3, -7); ctx.lineTo(3, -10); ctx.stroke();
    if (known) {
      ctx.globalAlpha = 1;
      ctx.font = "700 10px Menlo, monospace"; ctx.textAlign = "center";
      ctx.fillStyle = "#c6ff00";
      ctx.fillText("?", 0, -16);
    }
    ctx.restore();
  }

  // black box: half-buried, blinking faintly when you're near
  const bb = level.blackbox;
  if (bb && !bb.found) {
    const near = Math.hypot(ship.x - bb.x, ship.y - bb.y) < 420;
    const blink = 0.25 + (near ? 0.55 * Math.abs(Math.sin(now * 4)) : 0.08 * Math.abs(Math.sin(now * 1.3)));
    ctx.save();
    ctx.translate(bb.x, bb.y);
    ctx.rotate(0.4);
    ctx.strokeStyle = "rgba(179,136,255," + blink.toFixed(2) + ")";
    ctx.shadowColor = "#b388ff"; ctx.shadowBlur = near ? 14 : 4;
    ctx.lineWidth = 2;
    ctx.strokeRect(-8, -6, 16, 10);
    ctx.beginPath(); ctx.arc(0, -10, 2, 0, 7); ctx.stroke();
    ctx.restore();
    if (bb.scanT > 0) {
      ctx.strokeStyle = "#b388ff"; ctx.shadowColor = "#b388ff"; ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(bb.x, bb.y - 24, 16, -Math.PI / 2, -Math.PI / 2 + (bb.scanT / 1.5) * Math.PI * 2);
      ctx.stroke(); ctx.shadowBlur = 0;
      ctx.font = "700 10px Menlo, monospace"; ctx.textAlign = "center";
      ctx.fillStyle = "#b388ff";
      ctx.fillText("SCANNING…", bb.x, bb.y - 48);
    }
  }

  if (level.beacon) drawBeacon(now);

  for (const o of level.oids) {
    if (o.state === "aboard" || o.state === "delivered" || o.state === "lost" ||
        o.state === "contained" || o.state === "escaped") continue;
    drawOid(o, now);
  }

  for (const t of level.turrets) {
    if (!t.alive) continue;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.shadowColor = "#ff4081"; ctx.shadowBlur = 10;
    ctx.fillStyle = "#3a0d24";
    ctx.strokeStyle = "#ff4081"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 12, Math.PI, 0); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(Math.cos(t.ang) * 6, -10 + Math.sin(t.ang) * 6);
    ctx.lineTo(Math.cos(t.ang) * 18, -10 + Math.sin(t.ang) * 18);
    ctx.stroke();
    ctx.restore();
  }

  for (const dr of level.drones) {
    if (!dr.alive) continue;
    ctx.save();
    ctx.translate(dr.x, dr.y);
    ctx.rotate(Math.sin(dr.bob * 2) * 0.2);
    ctx.shadowColor = "#ff4081"; ctx.shadowBlur = 12;
    ctx.strokeStyle = "#ff4081"; ctx.lineWidth = 2;
    ctx.fillStyle = "rgba(255,64,129,.12)";
    ctx.beginPath();
    ctx.moveTo(0, -10); ctx.lineTo(9, 0); ctx.lineTo(0, 10); ctx.lineTo(-9, 0);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#ff8ab3";
    ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, 7); ctx.fill();
    ctx.restore();
  }

  ctx.shadowBlur = 8;
  for (const b of level.bullets) {
    ctx.shadowColor = "#ff4081"; ctx.fillStyle = "#ff8ab3";
    ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill();
  }
  for (const b of level.shots) {
    ctx.shadowColor = "#00e5ff"; ctx.fillStyle = "#a7f6ff";
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, 7); ctx.fill();
  }
  ctx.shadowBlur = 0;

  for (const p of particles) {
    ctx.globalAlpha = clamp(p.t / p.max, 0, 1);
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  if (!ship.dead) drawShip(now);
  if (!ship.dead && !ship.landed && state === "play") drawLandingGuide();

  ctx.textAlign = "center";
  ctx.font = "700 13px Menlo, monospace";
  for (const t of texts) {
    ctx.globalAlpha = clamp(t.t, 0, 1);
    ctx.shadowColor = t.color; ctx.shadowBlur = 8;
    ctx.fillStyle = t.color;
    ctx.fillText(t.str, t.x, t.y);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  if (level.dark) drawDarkness(now);
}

/* darkness overlay with punched lights — Nightingale's sector */
function drawDarkness(now) {
  const { z, cx, cy } = worldTransform();
  const toScreen = (wx, wy) => [(saLeft + (wx - cx) * z) * dpr, (wy - cy) * z * dpr];
  dctx.setTransform(1, 0, 0, 1, 0, 0);
  dctx.clearRect(0, 0, darkCanvas.width, darkCanvas.height);
  dctx.fillStyle = "rgba(2,3,10,0.9)";
  dctx.fillRect(0, 0, darkCanvas.width, darkCanvas.height);
  dctx.globalCompositeOperation = "destination-out";
  const punch = (wx, wy, r, strength) => {
    const [sx, sy] = toScreen(wx, wy);
    const rr = r * z * dpr;
    const gr = dctx.createRadialGradient(sx, sy, 0, sx, sy, rr);
    gr.addColorStop(0, "rgba(0,0,0," + strength + ")");
    gr.addColorStop(1, "rgba(0,0,0,0)");
    dctx.fillStyle = gr;
    dctx.beginPath(); dctx.arc(sx, sy, rr, 0, 7); dctx.fill();
  };
  if (!ship.dead) punch(ship.x, ship.y, lampRadius(), 1);
  if (!level.isCave) punch(level.mx, level.my + 40, 260, 0.9);
  for (const o of level.oids) {  // stranded Scions carry tiny beacons
    if (o.state === "wait" || o.state === "walk" || o.state === "panic")
      punch(o.x, o.y - 10, 46, 0.55 + 0.3 * Math.abs(Math.sin(now * 2 + o.wave)));
  }
  if (level.beacon && !level.beacon.resolved) punch(level.beacon.x, level.beacon.y - 40, 220, 0.8);
  if (level.blackbox && !level.blackbox.found) punch(level.blackbox.x, level.blackbox.y, 36, 0.4);
  if (level.isCave) {   // the Hollows keep their own faint lights
    punch(level.lift.x, level.lift.y - 20, 120, 0.6);
    if (level.shrine && !level.shrine.found)
      punch(level.shrine.x, level.shrine.y - 30, 150, 0.5 + 0.2 * Math.abs(Math.sin(now * 1.4)));
  }
  dctx.globalCompositeOperation = "source-over";
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.drawImage(darkCanvas, 0, 0);
}

function drawShip(now) {
  const s = ship;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.ang);
  ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 14;
  ctx.strokeStyle = "#00e5ff"; ctx.lineWidth = 2;
  ctx.fillStyle = "rgba(0,229,255,.12)";
  ctx.beginPath();
  ctx.moveTo(0, -13);
  ctx.lineTo(9, 9); ctx.lineTo(4, 5); ctx.lineTo(-4, 5); ctx.lineTo(-9, 9);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
  if (s.shield) {   // the force field
    const r = SHIP_R + 8 + Math.sin(now * 10) * 1.3;
    ctx.save();
    ctx.strokeStyle = "rgba(105,240,174,.85)";
    ctx.shadowColor = "#69f0ae"; ctx.shadowBlur = 14;
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, 7); ctx.stroke();
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = "#69f0ae";
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, 7); ctx.fill();
    ctx.restore();
  }
  if (s.landed) {
    ctx.shadowColor = "#69f0ae"; ctx.shadowBlur = 10;
    ctx.strokeStyle = "rgba(105,240,174,.7)";
    ctx.beginPath(); ctx.moveTo(s.x - 14, s.y + SHIP_R + 2); ctx.lineTo(s.x + 14, s.y + SHIP_R + 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // Curie's compass to the nearest unrecovered black box
  if (upgrades.radiosense && level.blackbox && !level.blackbox.found) {
    const dx = level.blackbox.x - s.x, dy = level.blackbox.y - s.y;
    const a = Math.atan2(dy, dx);
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(a);
    ctx.strokeStyle = "rgba(179,136,255," + (0.4 + 0.4 * Math.abs(Math.sin(now * 3))).toFixed(2) + ")";
    ctx.shadowColor = "#b388ff"; ctx.shadowBlur = 8;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(24, 0); ctx.lineTo(34, 0);
    ctx.lineTo(30, -4); ctx.moveTo(34, 0); ctx.lineTo(30, 4);
    ctx.stroke();
    ctx.restore();
  }
}

function drawLandingGuide() {
  const s = ship;
  const g = groundAt(s.x);
  const alt = g - (s.y + SHIP_R);
  if (alt <= 0 || alt > 320) return;
  const ev = landingEval();
  const color = ev.soft ? "#69f0ae" : ev.survivable ? "#ffc400" : "#ff4081";
  ctx.save();
  ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.globalAlpha = 0.9;
  ctx.setLineDash([4, 6]);
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(s.x, s.y + 16); ctx.lineTo(s.x, g); ctx.stroke();
  ctx.setLineDash([]);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(s.x - 14, groundAt(s.x - 14));
  ctx.lineTo(s.x + 14, groundAt(s.x + 14));
  ctx.stroke();
  ctx.font = "700 11px Menlo, monospace";
  ctx.textAlign = "left";
  ctx.fillStyle = color;
  const vArrow = s.vy >= 0 ? "↓" : "↑";
  ctx.fillText(vArrow + Math.abs(Math.round(s.vy)) + "  ↔" + Math.abs(Math.round(s.vx)), s.x + 20, s.y - 2);
  if (!ev.soft && ev.reason) {
    ctx.font = "600 9px Menlo, monospace";
    ctx.fillText(ev.reason, s.x + 20, s.y + 10);
  }
  ctx.restore();
}

/* Shared neon android figure, drawn with feet at the origin.
   Rounded head with blinking eyes, antenna with a bobble, a torso
   wearing the medic cross, articulated arms with hands. */
function doidFigure(p) {
  ctx.shadowColor = p.col; ctx.shadowBlur = 10;
  ctx.strokeStyle = p.col; ctx.lineWidth = 2;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  if (p.sitting) {
    ctx.moveTo(-1.5, -6); ctx.lineTo(-5, -6); ctx.lineTo(-5, 0);
    ctx.moveTo(1.5, -6); ctx.lineTo(5, -6); ctx.lineTo(5, 0);
  } else {
    ctx.moveTo(-1.5, -6); ctx.lineTo(-3.5 - p.legPh, 0);
    ctx.moveTo(1.5, -6); ctx.lineTo(3.5 + p.legPh, 0);
  }
  ctx.moveTo(-4, -12); ctx.lineTo(p.armL[0], p.armL[1]);
  ctx.moveTo(4, -12); ctx.lineTo(p.armR[0], p.armR[1]);
  ctx.stroke();
  ctx.fillStyle = p.col;
  ctx.beginPath(); ctx.arc(p.armL[0], p.armL[1], 1.3, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(p.armR[0], p.armR[1], 1.3, 0, 7); ctx.fill();
  // torso
  ctx.beginPath();
  ctx.moveTo(-4.5, -14); ctx.lineTo(4.5, -14); ctx.lineTo(3.5, -6); ctx.lineTo(-3.5, -6);
  ctx.closePath();
  ctx.fillStyle = p.fill; ctx.fill(); ctx.stroke();
  // the medic cross — these are healers
  ctx.fillStyle = p.crossCol;
  ctx.fillRect(-0.8, -12.4, 1.6, 4.2);
  ctx.fillRect(-2.1, -11.1, 4.2, 1.6);
  // head
  ctx.beginPath();
  ctx.moveTo(-3.5, -15.5);
  ctx.lineTo(-3.5, -19); ctx.arcTo(-3.5, -21, -1.5, -21, 2);
  ctx.lineTo(1.5, -21); ctx.arcTo(3.5, -21, 3.5, -19, 2);
  ctx.lineTo(3.5, -15.5);
  ctx.closePath();
  ctx.fillStyle = p.fill; ctx.fill(); ctx.stroke();
  // eyes (they blink)
  ctx.fillStyle = p.col;
  if (p.blink) { ctx.fillRect(-2.4, -18.1, 1.7, 0.9); ctx.fillRect(0.7, -18.1, 1.7, 0.9); }
  else { ctx.fillRect(-2.3, -18.9, 1.6, 2); ctx.fillRect(0.7, -18.9, 1.6, 2); }
  // antenna with swaying bobble
  ctx.beginPath();
  ctx.moveTo(0, -21); ctx.lineTo(p.sway, -25);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(p.sway, -26, 1.4, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;
}

/* Each Scion has a persona — big wavers, two-arm wavers, jumpers,
   pacers, sitters — plus individual size and gait. The saboteur tell
   survives all of them: their motion keeps perfect mechanical time. */
function drawOid(o, now) {
  const mech = o.role === "saboteur";
  const t = now + o.wave * 3;
  const sc = 1.2 * (o.scale || 1);
  const osc = f => mech ? Math.sign(Math.sin(t * f)) * 0.85 : Math.sin(t * f);
  const dying = o.state === "dying";
  const panic = o.state === "panic" || (dying && o.deathType === "torched");
  const walking = o.state === "walk";
  const pacing = o.state === "wait" && o.persona === "pace";
  const sitting = o.state === "wait" && o.persona === "sit" && !o.nearShip;
  let hop = 0;
  if (o.state === "wait" && o.persona === "jump") {
    const cyc = 1.7, ph = ((t % cyc) + cyc) % cyc;
    if (ph < 0.45) hop = (mech
      ? (ph < 0.225 ? ph / 0.225 : 1 - (ph - 0.225) / 0.225)
      : Math.sin(ph / 0.45 * Math.PI)) * 7;
  }
  if (panic) hop = Math.abs(Math.sin(t * 14)) * 3;
  const legPh = (walking || pacing || panic) ? Math.sin(t * (panic ? 16 : 10)) * 2.6 : 0;

  // arm pose
  let armL, armR;
  if (dying && o.deathType === "shot") {
    armL = [-1.2, -11]; armR = [1.2, -11];                // clutches the cross
  } else if (panic || (o.state === "wait" && o.persona === "jump")) {
    const fl = panic ? osc(12) * 2 : 0;
    armL = [-6.5 - fl, -20]; armR = [6.5 + fl, -20];      // arms overhead
  } else if (walking || pacing) {
    armL = [-5 - legPh * 0.7, -7]; armR = [5 + legPh * 0.7, -7];  // stride swing
  } else if (sitting) {
    armL = [-5, -7]; armR = [5, -7];                       // hands on knees
  } else if (o.persona === "wave2" || (o.persona === "sit" && o.nearShip)) {
    armL = [-6, -19 - osc(5) * 3]; armR = [6, -19 + osc(5) * 3];  // "over here!"
  } else {
    armL = [-7, -8]; armR = [6, -19 + osc(5) * 3.5];       // one big wave
  }

  ctx.save();
  ctx.translate(o.x, o.y - hop);
  if (dying && o.deathType === "shot")
    ctx.rotate(-Math.min(1, o.deathT) * Math.PI / 2);      // keels over backward
  ctx.scale(sc, sc);
  let tint = mech && upgrades.antisepsis ? "#c6ff00" : "#69f0ae";
  if (dying && o.deathType === "torched") tint = "#ff9e40";
  doidFigure({
    col: tint,
    fill: "rgba(10,30,24,.85)",
    crossCol: "#ff5d7d",
    legPh, sitting,
    armL, armR,
    blink: mech ? ((t * 2) % 2) < 0.12 : (((t * 0.53) + o.wave) % 3.1) < 0.12,
    sway: mech ? 0 : osc(2.2) * 1.5
  });
  ctx.restore();
  // famous Scions shimmer, if you watch closely
  if (o.role === "famous" && Math.random() < 0.06) {
    particles.push({ x: o.x + (Math.random() - 0.5) * 10, y: o.y - 22,
      vx: (Math.random() - 0.5) * 12, vy: -26, t: 0.9, max: 1, color: "#ffd54f", size: 2 });
  }
  if (mech && upgrades.antisepsis && !dying) {
    ctx.font = "700 10px Menlo, monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "#c6ff00";
    ctx.fillText("?", o.x, o.y - hop - 36);
  }
}

/* ---------------- scenery ---------------- */
function drawScenery(now) {
  for (const sc of level.scenery) {
    if (sc.dead) continue;
    switch (sc.type) {
      case "tree":   drawTree(sc, now); break;
      case "rock":   drawRockScn(sc, now); break;
      case "bld":    drawBuilding(sc, now, false); break;
      case "ruin":   drawBuilding(sc, now, true); break;
      case "wreckM": drawWreckM(sc, now); break;
      case "wreckS": drawWreckS(sc, now); break;
    }
  }
}

/* alien glow-flora. The lure-trees keep perfect mechanical time —
   the same tell the saboteurs carry. */
function drawTree(sc, now) {
  const sway = sc.fake ? Math.sign(Math.sin(now * 1.6 + sc.ph)) * 0.55
                       : Math.sin(now * 0.9 + sc.ph);
  ctx.save();
  ctx.translate(sc.x, sc.y);
  ctx.rotate(sc.tilt);
  ctx.scale(sc.s, sc.s);
  const h = 34;
  ctx.strokeStyle = "rgba(120,200,255,.4)";
  ctx.lineWidth = 2; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(2, -h * 0.55, sway * 2.4, -h);
  ctx.moveTo(0.6, -h * 0.45); ctx.lineTo(8 + sway * 2, -h * 0.7);
  ctx.moveTo(0, -h * 0.6); ctx.lineTo(-7 + sway * 2, -h * 0.85);
  ctx.stroke();
  const col = "#00bfa5";
  ctx.shadowColor = col; ctx.shadowBlur = 8;
  ctx.strokeStyle = "rgba(0,191,165,.55)";
  ctx.fillStyle = "rgba(0,191,165,.1)";
  const puff = (px, py, r) => {
    ctx.beginPath(); ctx.arc(px + sway * 3, py, r, 0, 7); ctx.fill(); ctx.stroke();
  };
  puff(sway * 2.4, -h - 6, 8);
  puff(sway * 2.4 - 8, -h + 1, 6);
  puff(sway * 2.4 + 8, -h, 6.5);
  ctx.restore();
  if (sc.fake && upgrades.canon) {
    ctx.font = "700 10px Menlo, monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "#c6ff00";
    ctx.fillText("?", sc.x, sc.y - 52 * sc.s);
  }
}

/* rocks are inert — except the one that breathes */
function drawRockScn(sc, now) {
  ctx.save();
  ctx.translate(sc.x, sc.y);
  ctx.rotate(sc.tilt);
  ctx.scale(sc.s, sc.s);
  const breathe = sc.hollow ? 0.16 * Math.sin(now * 1.1 + sc.ph) : 0;
  ctx.strokeStyle = "rgba(150,140,200," + (0.4 + breathe).toFixed(2) + ")";
  ctx.fillStyle = "#141031";
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  sc.verts.forEach(([vx, vy], i) => i === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy));
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

/* settlements: intact towers with lit windows, and what's left of them */
function drawBuilding(sc, now, ruined) {
  ctx.save();
  ctx.translate(sc.x, sc.y);
  ctx.rotate(sc.tilt * (ruined ? 1.5 : 0.4));
  const w = sc.w, h = ruined ? sc.h * 0.62 : sc.h;
  ctx.fillStyle = "rgba(8,12,30,.9)";
  ctx.strokeStyle = ruined ? "rgba(150,140,200,.35)" : "rgba(0,229,255,.4)";
  ctx.lineWidth = 2;
  ctx.shadowColor = ruined ? "#7c4dff" : "#00e5ff"; ctx.shadowBlur = 5;
  ctx.beginPath();
  if (ruined) {
    ctx.moveTo(-w / 2, 0);
    ctx.lineTo(-w / 2, -h + sc.jag[0]);
    for (let j = 1; j <= 4; j++) ctx.lineTo(-w / 2 + (w * j) / 4, -h + sc.jag[j]);
    ctx.lineTo(w / 2, 0);
  } else ctx.rect(-w / 2, -h, w, h);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  // windows
  const cw = w / (sc.cols + 1), ch = h / (sc.rows + 1);
  let idx = 0;
  for (let r = 0; r < sc.rows; r++) for (let c = 0; c < sc.cols; c++, idx++) {
    const lit = ruined ? idx === sc.flick : sc.lit[idx];
    if (!lit) continue;
    let a = ruined ? 0.12 + 0.25 * Math.abs(Math.sin(now * 3.7 + sc.ph)) : 0.5;
    if (!ruined && idx === sc.flick) a = 0.15 + 0.4 * Math.abs(Math.sin(now * 5 + sc.ph));
    const wx = -w / 2 + cw * (c + 0.7), wy = -h + ch * (r + 0.7);
    if (ruined && wy < -h * 0.75) continue;
    ctx.fillStyle = "rgba(255,196,0," + a.toFixed(2) + ")";
    ctx.fillRect(wx, wy, 3.4, 4.6);
  }
  if (!ruined) { // antenna with a slow red blink
    ctx.strokeStyle = "rgba(0,229,255,.4)"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(0, -h); ctx.lineTo(0, -h - 12); ctx.stroke();
    if (Math.sin(now * 1.8 + sc.ph) > 0.85) {
      ctx.fillStyle = "#ff1744"; ctx.shadowColor = "#ff1744"; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0, -h - 13, 1.8, 0, 7); ctx.fill();
      ctx.shadowBlur = 0;
    }
  } else { // rubble at the foot
    ctx.strokeStyle = "rgba(150,140,200,.25)";
    ctx.beginPath();
    ctx.moveTo(-w / 2 - 8, 0); ctx.lineTo(-w / 2 - 2, -5); ctx.lineTo(-w / 2 + 5, 0);
    ctx.moveTo(w / 2 - 4, 0); ctx.lineTo(w / 2 + 3, -6); ctx.lineTo(w / 2 + 9, 0);
    ctx.stroke();
  }
  ctx.restore();
}

/* a MERCY-class sister, down and half-dark — her cross still flickers */
function drawWreckM(sc, now) {
  ctx.save();
  ctx.translate(sc.x, sc.y + 4);
  ctx.rotate(sc.tilt + sc.lean * 0.5);
  ctx.scale(sc.s * 0.62, sc.s * 0.62);
  ctx.strokeStyle = "rgba(0,229,255,.3)";
  ctx.fillStyle = "rgba(8,12,26,.85)";
  ctx.lineWidth = 2.5;
  ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(-130, 0); ctx.lineTo(-80, -26); ctx.lineTo(80, -26);
  ctx.lineTo(130, 0); ctx.lineTo(80, 22); ctx.lineTo(-80, 22);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // hull breach
  ctx.strokeStyle = "rgba(150,140,200,.4)"; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(20, -26); ctx.lineTo(34, -8); ctx.lineTo(24, 4); ctx.lineTo(40, 22);
  ctx.stroke();

/* the secret lift. On the surface it is almost nothing: two hairline
   seams, four rivets, a glint every few seconds. In the Hollows it is
   the way home, and glows like it. */
function drawLift(now) {
  const L = level.lift;
  if (!L) return;
  ctx.save();
  ctx.translate(L.x, L.y);
  if (level.isCave) {
    const a = 0.5 + 0.3 * Math.sin(now * 2.2);
    ctx.strokeStyle = "rgba(179,136,255," + a.toFixed(2) + ")";
    ctx.shadowColor = "#b388ff"; ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-46, 2); ctx.lineTo(46, 2); ctx.stroke();
    for (let k = 0; k < 3; k++) {   // chevrons pointing up
      const ph = ((now * 0.7 + k / 3) % 1);
      ctx.globalAlpha = (1 - ph) * 0.7;
      const yy = -8 - ph * 34;
      ctx.beginPath(); ctx.moveTo(-9, yy); ctx.lineTo(0, yy - 7); ctx.lineTo(9, yy); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.font = "600 9px Menlo, monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "rgba(179,136,255,.75)";
    ctx.fillText("RETURN LIFT — land and hold", 0, -52);
  } else {
    const glint = Math.sin(now * 0.43 + L.x) > 0.988 ? 0.4 : 0;
    const a = 0.13 + glint;
    ctx.strokeStyle = "rgba(179,136,255," + a.toFixed(2) + ")";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-44, 1); ctx.lineTo(-44, 4); ctx.moveTo(44, 1); ctx.lineTo(44, 4);
    ctx.moveTo(-44, 2.5); ctx.lineTo(44, 2.5);
    ctx.stroke();
    ctx.fillStyle = "rgba(179,136,255," + (a + 0.06).toFixed(2) + ")";
    for (const rx of [-36, -12, 12, 36]) ctx.fillRect(rx - 1, 0, 2, 2);
  }
  if (L.holdT > 0) {   // the hold ring, once you've noticed
    ctx.strokeStyle = "#b388ff"; ctx.shadowColor = "#b388ff"; ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -26, 15, -Math.PI / 2, -Math.PI / 2 + (L.holdT / 2.4) * Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

/* Glycon's shrine, down in the dark: a serpent coiled around a mask */
function drawShrine(now) {
  const sh = level.shrine;
  ctx.save();
  ctx.translate(sh.x, sh.y);
  const col = sh.found ? "#69f0ae" : "#c6ff00";
  ctx.strokeStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 12;
  ctx.lineWidth = 2;
  // plinth
  ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-12, -8); ctx.lineTo(12, -8); ctx.lineTo(18, 0); ctx.stroke();
  // the coil
  ctx.beginPath();
  ctx.moveTo(-8, -8);
  ctx.bezierCurveTo(-16, -20, 8, -22, 2, -32);
  ctx.bezierCurveTo(-4, -40, 12, -42, 6, -52);
  ctx.stroke();
  // the mask it wears
  ctx.beginPath(); ctx.arc(6, -58, 6, 0, 7); ctx.stroke();
  ctx.fillStyle = col;
  ctx.fillRect(3, -60, 2.2, 1.4); ctx.fillRect(7.6, -60, 2.2, 1.4);
  if (!sh.found) {
    const ph = (now % 2.6) / 2.6;

      ctx.globalAlpha = (1 - p) * 0.4;
      ctx.beginPath(); ctx.arc(0, -34, 14 + p * 90, 0, 7); ctx.stroke();
    }

    if (sh.scanT > 0) {
      ctx.strokeStyle = "#aef4ff"; ctx.shadowColor = "#aef4ff";

      ctx.arc(0, -34, 20, -Math.PI / 2, -Math.PI / 2 + (sh.scanT / 2) * Math.PI * 2);

}

function drawBar(x, y, w, h, frac, color, label) {
  ctx.strokeStyle = "rgba(255,255,255,.25)"; ctx.lineWidth = 1;

  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.fillRect(x + 1, y + 1, (w - 2) * clamp(frac, 0, 1), h - 2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,.6)";

}

/* Live ECG as the health bar. Beat rate rises as vitals fall;
   a contaminant aboard shows as an arrhythmia — the medical tell. */
function drawECG(x, y, w, h, frac, now) {
  const color = frac > 0.55 ? "#69f0ae" : frac > 0.3 ? "#ffc400" : "#ff4081";
  ctx.strokeStyle = "rgba(255,255,255,.25)"; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  const bpm = lerp(3.4, 1.2, clamp(frac, 0, 1)) + (ship.beat > 0 ? 2 : 0);
  const arrhythmia = state !== "title" && contaminantAboard();
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h); ctx.clip();
  ctx.beginPath();
  const mid = y + h * 0.6;
  for (let px = 0; px <= w; px += 2) {
    const t = (now * 90 - (w - px)) / 90 * bpm;
    let ph = ((t % 1) + 1) % 1;
    // every third beat arrives early when something is wrong aboard
    if (arrhythmia && Math.floor(t) % 3 === 2) ph = (ph * 1.7) % 1;
    let v = 0;
    if (ph < 0.08) v = -0.2;
    else if (ph < 0.14) v = 1.0;
    else if (ph < 0.18) v = -0.45;
    else if (ph < 0.3) v = 0.18;
    v *= (frac > 0 ? 1 : 0);
    const yy = mid - v * h * 0.55;
    px === 0 ? ctx.moveTo(x + px, yy) : ctx.lineTo(x + px, yy);
  }
  ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8; ctx.lineWidth = 1.6;
  ctx.stroke();
  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,.6)";
  ctx.font = "600 8px Menlo, monospace"; ctx.textAlign = "right";
  ctx.fillText("VITALS " + Math.max(0, Math.round(frac * 100)) + "%", x + w, y + h + 9);
}

/* the codex: famous Scions recovered across every run */
function drawCodex(now) {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "rgba(5,6,15,.82)";
  ctx.fillRect(0, 0, vw, vh);
  const w = Math.min(640, vw - 36);
  const rowH = Math.min(50, (vh - 132) / FAMOUS.length);

/* ------- illustrated intro panels ------- */
function iShip(cx, cy, s, tilt, flicker) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt || 0);
  ctx.scale(s, s);
  ctx.globalAlpha *= flicker === undefined ? 1 : flicker;
  ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 18;
  ctx.strokeStyle = "#00e5ff"; ctx.lineWidth = 2.5;
  ctx.fillStyle = "rgba(0,40,60,.55)";
  ctx.beginPath();
  ctx.moveTo(-130, 0); ctx.lineTo(-80, -26); ctx.lineTo(80, -26);
  ctx.lineTo(130, 0); ctx.lineTo(80, 22); ctx.lineTo(-80, 22);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.shadowColor = "#ff1744"; ctx.shadowBlur = 14;
  ctx.fillStyle = "#ff2d55";
  ctx.fillRect(-5, -16, 10, 26); ctx.fillRect(-13, -8, 26, 10);
  ctx.restore();
}
function iDoid(cx, cy, s, phase, gold, armsUp) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  const t = performance.now() / 1000 * 5 + phase;
  const w = Math.sin(t) * 3;
  doidFigure({
    col: gold ? "#ffd54f" : "#69f0ae",
    fill: "rgba(10,30,24,.85)",
    crossCol: "#ff5d7d",
    legPh: 0, sitting: false,
    armL: armsUp ? [-6, -19 - w] : [-7, -8],
    armR: [6, -19 + w],
    blink: ((t * 0.11 + phase) % 3.1) < 0.12,
    sway: Math.sin(t * 0.44) * 1.5
  });
  ctx.restore();
}
function iStars(px, py, pw, ph, seed) {
  const rng = mulberry32(seed);
  ctx.fillStyle = "rgba(200,220,255,.7)";
  for (let i = 0; i < 40; i++) {
    ctx.globalAlpha = 0.2 + rng() * 0.6;
    ctx.fillRect(px + rng() * pw, py + rng() * ph, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
}
function iRidge(px, py, pw, ph, seed) {
  const rng = mulberry32(seed);
  ctx.beginPath();
  ctx.moveTo(px, py + ph);
  let y = ph * 0.72;
  for (let x = 0; x <= pw; x += pw / 14) {
    y = clamp(y + (rng() - 0.5) * ph * 0.3, ph * 0.55, ph * 0.9);
    ctx.lineTo(px + x, py + y);
  }
  ctx.lineTo(px + pw, py + ph);
  ctx.closePath();
  ctx.fillStyle = "#151040"; ctx.fill();
  ctx.shadowColor = "#7c4dff"; ctx.shadowBlur = 10;
  ctx.strokeStyle = "#b388ff"; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0;
}

/* rotate-to-landscape gate */
function drawPortraitWarning(now) {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "rgba(3,4,12,.92)";
  ctx.fillRect(0, 0, vw, vh);
  const cx = vw / 2, cy = vh * 0.4;
  // phone glyph animating from portrait to landscape
  const ph = (now % 2.4) / 2.4;
  const ease = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  const ang = ph < 0.55 ? ease(clamp(ph / 0.55, 0, 1)) * Math.PI / 2 : Math.PI / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-ang);
  ctx.strokeStyle = "#00e5ff"; ctx.shadowColor = "#00e5ff"; ctx.shadowBlur = 16;
  ctx.lineWidth = 3;
  const w = 54, h = 96, r = 10;
  ctx.beginPath();
  ctx.moveTo(-w / 2 + r, -h / 2);
  ctx.arcTo(w / 2, -h / 2, w / 2, h / 2, r);
  ctx.arcTo(w / 2, h / 2, -w / 2, h / 2, r);
  ctx.arcTo(-w / 2, h / 2, -w / 2, -h / 2, r);
  ctx.arcTo(-w / 2, -h / 2, w / 2, -h / 2, r);
  ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10, h / 2 - 12); ctx.lineTo(10, h / 2 - 12); ctx.stroke();
  ctx.restore();
  ctx.shadowBlur = 8;
  ctx.textAlign = "center";
  ctx.font = "800 18px Menlo, monospace";
  ctx.fillStyle = "#aef4ff"; ctx.shadowColor = "#00e5ff";
  ctx.fillText("ROTATE TO LANDSCAPE", cx, vh * 0.62);
  ctx.font = "600 12px Menlo, monospace";
  ctx.fillStyle = "rgba(155,234,249,.7)";
  ctx.fillText("Hollow Oath flies wide — turn your phone on its side", cx, vh * 0.68);
  ctx.shadowBlur = 0;
}

function drawEnding(now) {
  let title, body, color;

    title = "THE ANSWERED CALL";
    color = "#aef4ff";
    body = "You landed beside it and listened.\n\nThe beacon was AMS SOLACE — MERCY's sister ship, lost with all hands, her distress call looping for years. Every Scion that answered honestly was rewritten by the echo.\n\nYou didn't silence her. You told her she was heard.\nThe Static faded like a fever breaking.\n\n+6000" + (runFired === 0 ? "  ·  OATH KEPT +2000" : "");
    if (runFired === 0) body += "\n\nThe oath, kept whole.";
    else if (firedAtSecret && !firedAtCombat) body += "\n\nYou found what he hid. It cost you the oath to do it.";
  } else if (endingType === "fire") {
    title = "SILENCE BY FIRE";
    color = "#ffc400";
    body = "You burned the beacon out of the dark.\n\nThe Static is gone — and so is whatever was calling. MERCY logs the sector clean.\n\nThe silence feels heavier than it should.\n\nQuiet, at a cost. The oath, hollowed.\n\n+3000";
  } else {
    title = "ROTATION COMPLETE";
    color = "#b388ff";
    body = "The tour is over and the rescued are home.\n\nBut on the long ride back, under everything, the Static is still there. Repeating.\n\nLeft hollow. The Static answers still.\n\n◈ Black boxes recovered: " + blackboxCount + "/" + NBOX + " — recover at least 3 to triangulate its source.";
  }
  if (endingType !== "unresolved" && shrines.size >= SHRINES.length) {
    body += "\n\nAnd in the fleet record, appended in your hand: the serpent's mask, catalogued for good. No one will buy his cures again.";
  }
  drawCardPanel({ kicker: "— TRANSMISSION ENDS —", title, subtitle: "", body, color }, now);

function drawWin() {
  let rank = "FLIGHT SURGEON, A&M RESCUE DIVISION";
  if (endingType === "answered") {
    if (runFired === 0) rank = "OATH KEEPER — PRIMUM NON NOCERE";
    // broke the no-fire oath only to crack open Glycon's secrets, never in combat
    else if (firedAtSecret && !firedAtCombat) rank = "HOLLOW KEEPER";
    else rank = "THE ONE WHO ANSWERED";
  }
  else if (endingType === "fire") rank = "SECTOR WARDEN";
  const spotless = runLost === 0 ? "\nspotless record — no Scion lost" : "";
  const serpent = shrines.size >= SHRINES.length ? "\n☤ the serpent unmasked" : "";
  drawCenter(runLost === 0 && endingType === "answered" ? "A PERFECT ROTATION" : "MISSION COMPLETE",

    "  ·  ◈ " + blackboxCount + "/" + NBOX + "  ·  logs " + runFragments + "/" + FRAGMENTS.length +
    spotless + serpent +
    "\nrank: " + rank + "\ntap to play again", "#69f0ae");
}

camera = { x: ship.x, y: ship.y, shake: 0 };
particles = []; texts = [];

let last = performance.now();
function frame(t) {
  const dt = Math.min((t - last) / 1000, 0.05);
  last = t;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
