<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hollow Oath">
<meta name="theme-color" content="#05060f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Hollow Oath — a gravity rescue</title>
<style>
  :root { --sal: env(safe-area-inset-left, 0px); --sar: env(safe-area-inset-right, 0px); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none;
      -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#05060f; position:fixed; inset:0;
      touch-action:none; overscroll-behavior:none; }
  canvas { display:block; width:100%; height:100%; }
  .btn {
    position:fixed; width:72px; height:72px; border-radius:50%;
    border:2px solid rgba(0,229,255,.55); color:rgba(0,229,255,.9);
    background:rgba(0,229,255,.07);
    box-shadow:0 0 18px rgba(0,229,255,.25), inset 0 0 12px rgba(0,229,255,.12);
    font:700 13px/68px "Helvetica Neue", Arial, sans-serif; text-align:center;
    letter-spacing:1px; z-index:10; touch-action:none;
  }
  .btn.down { background:rgba(0,229,255,.28); box-shadow:0 0 30px rgba(0,229,255,.6); }
  #btnL, #btnR { width:88px; height:88px; font-size:15px; line-height:84px; }
  #btnL   { left:calc(14px + env(safe-area-inset-left));  bottom:calc(22px + env(safe-area-inset-bottom)); }
  #btnR   { left:calc(108px + env(safe-area-inset-left)); bottom:calc(22px + env(safe-area-inset-bottom)); }
  #btnFire   { right:calc(104px + env(safe-area-inset-right)); bottom:calc(24px + env(safe-area-inset-bottom));
    border-color:rgba(255,64,129,.55); color:rgba(255,64,129,.9); background:rgba(255,64,129,.07);
    box-shadow:0 0 18px rgba(255,64,129,.25), inset 0 0 12px rgba(255,64,129,.12); }
  #btnFire.down { background:rgba(255,64,129,.28); box-shadow:0 0 30px rgba(255,64,129,.6); }
  #btnThrust { right:calc(18px + env(safe-area-inset-right)); bottom:calc(24px + env(safe-area-inset-bottom));
    width:84px; height:84px; line-height:80px;
    border-color:rgba(255,196,0,.55); color:rgba(255,196,0,.9); background:rgba(255,196,0,.07);
    box-shadow:0 0 18px rgba(255,196,0,.25), inset 0 0 12px rgba(255,196,0,.12); }
  #btnThrust.down { background:rgba(255,196,0,.28); box-shadow:0 0 30px rgba(255,196,0,.6); }
  #btnShield { right:calc(130px + env(safe-area-inset-right)); bottom:calc(122px + env(safe-area-inset-bottom));
    width:64px; height:64px; line-height:60px; font-size:11px;
    border-color:rgba(105,240,174,.55); color:rgba(105,240,174,.9); background:rgba(105,240,174,.07);
    box-shadow:0 0 18px rgba(105,240,174,.25), inset 0 0 12px rgba(105,240,174,.12); }
  #btnShield.down { background:rgba(105,240,174,.28); box-shadow:0 0 30px rgba(105,240,174,.6); }
  @media (orientation: portrait) { .btn { display:none; } }
  body.noctl .btn { display:none !important; }  /* controls only exist in flight */
  #a2hs {
    position:fixed; top:calc(10px + env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%); z-index:30;
    display:flex; gap:10px; align-items:center; max-width:92vw;
    background:rgba(8,10,26,.95); border:1.5px solid rgba(0,229,255,.6);
    border-radius:12px; padding:9px 12px;
    color:#bfeefb; font:600 12px Menlo, monospace;
    box-shadow:0 0 18px rgba(0,229,255,.3);
  }
  #a2hs.hidden { display:none; }
  #a2hsBtn {
    background:rgba(0,229,255,.15); border:1.5px solid rgba(0,229,255,.7);
    color:#7fe9ff; font:700 12px Menlo, monospace; padding:6px 12px;
    border-radius:8px; white-space:nowrap;
  }
  #a2hsClose { background:none; border:none; color:rgba(255,255,255,.6);
    font:700 14px Menlo, monospace; padding:4px 6px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="btn" id="btnL">&#10226;</div>
<div class="btn" id="btnR">&#10227;</div>
<div class="btn" id="btnFire">FIRE</div>
<div class="btn" id="btnThrust">THRUST</div>
<div class="btn" id="btnShield">SHIELD</div>
<div id="a2hs" class="hidden">
  <span id="a2hsText"></span>
  <button id="a2hsBtn">INSTALL</button>
  <button id="a2hsClose">✕</button>
</div>
<script>
"use strict";
/* ================================================================
   HOLLOW OATH — a modern-glow gravity-rescue game (original code and art;
   mechanically in the lineage of the Atari ST gravity classic).
   Rescue the stranded Scions, ferry them to the hospital mothership
   AMS MERCY, and piece together what the Static is — seven sectors,
   hidden black boxes, famous Scions, saboteurs, secret lifts down into
   the Hollows, Glycon's counterfeits, and a secret finale.
   NOTE: the game was formerly titled DOIDS and the androids were "Doids";
   renamed to HOLLOW OATH / "Scions" (see CHANGELOG.md). localStorage keys
   and internal identifiers keep the doids_/__doids prefix on purpose.
   ================================================================ */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let vw = 0, vh = 0, dpr = 1;
let saLeft = 0, saRight = 0;
let darkCanvas = null, dctx = null;
/* ?perf=1 — an FPS/frame-time meter, cost-free unless the flag is set (Bundle D1) */
const PERF = /(?:^|[?&])perf=1(?:&|$)/.test(location.search);
let perfFrameMs = 0, perfFps = 0;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  vw = window.innerWidth; vh = window.innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  darkCanvas = document.createElement("canvas");
  darkCanvas.width = canvas.width; darkCanvas.height = canvas.height;
  dctx = darkCanvas.getContext("2d");
  // camera-cutout insets: keep the world clear of the lozenge
  const cs = getComputedStyle(document.documentElement);
  saLeft = parseFloat(cs.getPropertyValue("--sal")) || 0;
  saRight = parseFloat(cs.getPropertyValue("--sar")) || 0;
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 250));
resize();

/* ---------------- input ---------------- */
const input = { left:false, right:false, thrust:false, fire:false, shield:false, tap:false, tapX:0, tapY:0 };

/* One document-level multi-touch tracker instead of per-button listeners.
   Every active touch is hit-tested against every button on every touch
   event, so rolling a thumb from one button onto another (or pressing a
   second button while the first is still held) registers instantly —
   per-button touchstart/touchend can't do that, because a touch that
   starts on one element never fires events on its neighbour. */
const BTN_DEFS = [["btnL", "left"], ["btnR", "right"], ["btnThrust", "thrust"],
                  ["btnFire", "fire"], ["btnShield", "shield"]];
const btnEls = BTN_DEFS.map(([id, key]) => ({ key, el: document.getElementById(id) }));
const TOUCH_PAD = 14;   // forgiveness margin around each button, in px
function refreshButtonTouches(e) {
  const pressed = {};
  for (const t of e.touches) {
    for (const b of btnEls) {
      const r = b.el.getBoundingClientRect();
      if (r.width === 0) continue;   // hidden
      if (t.clientX >= r.left - TOUCH_PAD && t.clientX <= r.right + TOUCH_PAD &&
          t.clientY >= r.top - TOUCH_PAD && t.clientY <= r.bottom + TOUCH_PAD)
        pressed[b.key] = true;
    }
  }
  for (const b of btnEls) {
    input[b.key] = !!pressed[b.key];
    b.el.classList.toggle("down", !!pressed[b.key]);
  }
}
["touchstart", "touchmove", "touchend", "touchcancel"].forEach(ev =>
  document.addEventListener(ev, e => {
    if (ev === "touchstart") {
      initAudio();
      if (e.target && e.target.classList && e.target.classList.contains("btn"))
        e.preventDefault();   // stop synthesized mouse events on the buttons
    }
    refreshButtonTouches(e);
  }, { passive: false })
);
// desktop mouse still presses individual buttons
for (const b of btnEls) {
  const down = e => { e.preventDefault(); input[b.key] = true; b.el.classList.add("down"); initAudio(); };
  const up = () => { input[b.key] = false; b.el.classList.remove("down"); };
  b.el.addEventListener("mousedown", down);
  b.el.addEventListener("mouseup", up);
  b.el.addEventListener("mouseleave", up);
}

/* the tilt pill needs handling inside the raw gesture handler: iOS only
   grants DeviceOrientation permission from a real user gesture */
function canvasTap(x, y) {
  initAudio();
  // TILT permission must be requested from this synchronous gesture handler
  // (iOS DeviceOrientation rule) — never route it through the deferred
  // input.tap flag consumed later in the update() loop.
  if (state === "settings" && inRect(settingsRowRect(4), x, y)) { toggleTilt(); return; }
  input.tap = true; input.tapX = x; input.tapY = y;
}
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  canvasTap(e.touches[0].clientX, e.touches[0].clientY);
}, { passive:false });
canvas.addEventListener("mousedown", e => canvasTap(e.clientX, e.clientY));
document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
document.addEventListener("gesturestart", e => e.preventDefault());

function goFullscreen() {
  if (!("ontouchstart" in window)) return;
  const standalone = window.navigator.standalone ||
    (window.matchMedia && matchMedia("(display-mode: standalone)").matches);
  if (standalone || document.fullscreenElement || document.webkitFullscreenElement) return;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (!fn) return;
  try {
    const p = fn.call(el);
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
}

/* add-to-home-screen guidance for first-time visitors from a shared
   link: iOS gets share-sheet instructions, Android an install button */
(function () {
  const el = document.getElementById("a2hs");
  const txt = document.getElementById("a2hsText");
  const btn = document.getElementById("a2hsBtn");
  const close = document.getElementById("a2hsClose");
  let deferred = null;
  const standalone = window.navigator.standalone ||
    (window.matchMedia && matchMedia("(display-mode: standalone)").matches);
  const inFrame = window.top !== window.self;
  let dismissed = false;
  try { dismissed = localStorage.getItem("doids_a2hs") === "1"; } catch (e) {}
  const dismiss = () => {
    el.classList.add("hidden");
    try { localStorage.setItem("doids_a2hs", "1"); } catch (e) {}
  };
  close.addEventListener("click", dismiss);
  close.addEventListener("touchstart", e => { e.preventDefault(); dismiss(); }, { passive:false });
  window.hideA2HS = () => el.classList.add("hidden");
  if (standalone || inFrame || dismissed) return;
  const ios = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  if (ios) {
    btn.style.display = "none";
    txt.textContent = "Play fullscreen: tap ⬆ Share, then “Add to Home Screen”";
    el.classList.remove("hidden");
  } else {
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferred = e;
      txt.textContent = "Play Hollow Oath fullscreen anytime";
      el.classList.remove("hidden");
    });
    const install = e => {
      e.preventDefault();
      if (deferred) { deferred.prompt(); deferred = null; }
      dismiss();
    };
    btn.addEventListener("click", install);
    btn.addEventListener("touchstart", install, { passive:false });
  }
})();

const keyMap = { ArrowLeft:"left", ArrowRight:"right", ArrowUp:"thrust", " ":"fire", x:"fire", z:"thrust",
                 ArrowDown:"shield", c:"shield", Shift:"shield" };
window.addEventListener("keydown", e => {
  if (keyMap[e.key] !== undefined) { input[keyMap[e.key]] = true; e.preventDefault(); }
  if (e.key === "Enter") {
    input.tap = true;
    // keyboard confirm has no pointer position — aim it at CONTINUE on game over
    if (state === "gameover") { const cr = continueRect(); input.tapX = cr.x + 1; input.tapY = cr.y + 1; }
  }
  if (e.key === "Escape" || e.key === "p" || e.key === "P") {
    if (state === "play") { state = "pause"; stateT = 0; }
    else if (state === "pause") { state = "play"; stateT = 0; }
  }
  initAudio();
});
window.addEventListener("keyup", e => { if (keyMap[e.key] !== undefined) input[keyMap[e.key]] = false; });

/* auto-pause when the tab/app is backgrounded — deliberate, not mid-flight */
document.addEventListener("visibilitychange", () => {
  if (document.hidden && state === "play") { snapshotRun(); state = "pause"; stateT = 0; }
});

/* ---------------- external controller (Gamepad API) ---------------- */
const pad = { left:false, right:false, thrust:false, fire:false, shield:false, connected:false };
let padStartPrev = false, padAPrev = false;
function pollPad() {
  pad.left = pad.right = pad.thrust = pad.fire = pad.shield = false;
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (const g of gps) if (g && g.connected) { gp = g; break; }
  pad.connected = !!gp;
  if (!gp) { padStartPrev = padAPrev = false; return; }
  const b = i => !!(gp.buttons[i] && gp.buttons[i].pressed);
  const ax = gp.axes[0] || 0;
  pad.left   = ax < -0.35 || b(14);
  pad.right  = ax >  0.35 || b(15);
  pad.thrust = b(0) || b(7) || b(12);          // A / RT / d-pad up
  pad.fire   = b(2) || b(5);                   // X / RB
  pad.shield = b(1) || b(4) || b(6);           // B / LB / LT
  const start = b(9), a = b(0);
  if (start && !padStartPrev) {
    if (state === "play") { state = "pause"; stateT = 0; }
    else if (state === "pause") { state = "play"; stateT = 0; }
    else input.tap = true;
  } else if (state !== "play" && state !== "pause" && a && !padAPrev) input.tap = true;
  padStartPrev = start; padAPrev = a;
}
window.addEventListener("gamepadconnected", () => banner("CONTROLLER CONNECTED", "#69f0ae"));

/* ---------------- gyro / tilt steering ---------------- */
let tilt = false;
try { tilt = localStorage.getItem("doids_tilt") === "1"; } catch (e) {}
const gyro = { ok:false, beta:0, gamma:0 };
let gyroBound = false;
function startGyro() {
  if (gyroBound) return;
  gyroBound = true;
  window.addEventListener("deviceorientation", e => {
    if (e.beta === null && e.gamma === null) return;
    gyro.ok = true; gyro.beta = e.beta || 0; gyro.gamma = e.gamma || 0;
  });
}
function enableGyro() {
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === "granted") startGyro(); else disableTilt(); })
      .catch(() => disableTilt());
  } else startGyro();
}
function disableTilt() {
  tilt = false;
  try { localStorage.setItem("doids_tilt", "0"); } catch (e) {}
}
function toggleTilt() {
  tilt = !tilt;
  try { localStorage.setItem("doids_tilt", tilt ? "1" : "0"); } catch (e) {}
  if (tilt) enableGyro();
  blip(tilt ? 440 : 300, tilt ? 660 : 200, 0.12, "sine", 0.1);
}
if (tilt) { // re-arm a saved preference on the first gesture (iOS needs one)
  const arm = () => { if (tilt) enableGyro(); window.removeEventListener("touchstart", arm); };
  window.addEventListener("touchstart", arm);
  if (!("ontouchstart" in window)) startGyro();
}
/* tilt angle -> steering value in [-1, 1], respecting landscape flip */
function gyroSteerVal() {
  if (!tilt || !gyro.ok) return 0;
  let angle = 0;
  if (screen.orientation && typeof screen.orientation.angle === "number") angle = screen.orientation.angle;
  else if (typeof window.orientation === "number") angle = window.orientation;
  let t = angle === 90 ? gyro.beta : (angle === -90 || angle === 270) ? -gyro.beta : gyro.gamma;
  const dz = 4, full = 24;
  return Math.sign(t) * clamp((Math.abs(t) - dz) / (full - dz), 0, 1);
}

/* ---------------- audio (tiny synth) ---------------- */
let AC = null, thrustNode = null, thrustGain = null, sfxGain = null, musicGain = null;
let sound = true, music = true;
try { sound = localStorage.getItem("doids_snd") !== "0"; } catch (e) {}
try { music = localStorage.getItem("doids_mus") !== "0"; } catch (e) {}
function initAudio() {
  if (AC) { if (AC.state === "suspended") AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    sfxGain = AC.createGain(); sfxGain.gain.value = sound ? 1 : 0; sfxGain.connect(AC.destination);
    musicGain = AC.createGain(); musicGain.gain.value = music ? 1 : 0; musicGain.connect(AC.destination);
    const bufferSize = AC.sampleRate * 0.5;
    const buf = AC.createBuffer(1, bufferSize, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    thrustNode = AC.createBufferSource();
    thrustNode.buffer = buf; thrustNode.loop = true;
    const lp = AC.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 320;
    thrustGain = AC.createGain(); thrustGain.gain.value = 0;
    thrustNode.connect(lp); lp.connect(thrustGain); thrustGain.connect(sfxGain);
    thrustNode.start();
    startMusic();
    updateDroneFreq();
  } catch (e) { AC = null; }
}
// per-call jitter so repeats of the same one-shot don't sample identically
const rjit = (v, range) => v * (1 + (Math.random() * 2 - 1) * range);
function blip(freq0, freq1, dur, type, vol) {
  if (!AC) return;
  const f0 = rjit(freq0, 0.03), f1 = rjit(Math.max(freq1, 1), 0.03), d = rjit(dur, 0.05);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + d);
  g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
  o.connect(g); g.connect(sfxGain);
  o.start(); o.stop(AC.currentTime + d + 0.02);
  // quiet upper harmonic layer, independently jittered, for a touch of body
  const o2 = AC.createOscillator(), g2 = AC.createGain();
  o2.type = type || "square";
  o2.frequency.setValueAtTime(rjit(f0 * 2, 0.02), AC.currentTime);
  o2.frequency.exponentialRampToValueAtTime(rjit(f1 * 2, 0.02), AC.currentTime + d);
  g2.gain.setValueAtTime((vol || 0.12) * 0.18, AC.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
  o2.connect(g2); g2.connect(sfxGain);
  o2.start(); o2.stop(AC.currentTime + d + 0.02);
}
function boom() {
  if (!AC) return;
  const dur = rjit(0.6, 0.08), sz = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, sz, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / sz);
  const s = AC.createBufferSource(); s.buffer = buf;
  const g = AC.createGain(); g.gain.value = 0.35;
  const lp = AC.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = rjit(900, 0.15);
  s.connect(lp); lp.connect(g); g.connect(sfxGain); s.start();
  // a quiet sub-thump under the noise burst gives repeats a touch more weight
  const o = AC.createOscillator(), og = AC.createGain();
  o.type = "sine"; o.frequency.value = rjit(60, 0.1);
  og.gain.setValueAtTime(0.22, AC.currentTime);
  og.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur * 0.7);
  o.connect(og); og.connect(sfxGain);
  o.start(); o.stop(AC.currentTime + dur * 0.7 + 0.02);
}
function heartbeat(vol) { // lub-dub, played when a Scion comes aboard
  if (!AC) return;
  const V = vol || 1;
  const pulse = (t, f) => {
    const tj = Math.max(0, t + (Math.random() * 2 - 1) * 0.01); // ±10ms so beats don't lock-step
    const fj = rjit(f, 0.03);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = "sine"; o.frequency.value = fj;
    g.gain.setValueAtTime(0.0001, AC.currentTime + tj);
    g.gain.exponentialRampToValueAtTime(0.4 * V, AC.currentTime + tj + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + tj + 0.16);
    o.connect(g); g.connect(sfxGain);
    o.start(AC.currentTime + tj); o.stop(AC.currentTime + tj + 0.2);
    // quiet overtone gives each beat a touch of body without blurring the lub-dub read
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.type = "sine"; o2.frequency.value = fj * 2;
    g2.gain.setValueAtTime(0.0001, AC.currentTime + tj);
    g2.gain.exponentialRampToValueAtTime(0.08 * V, AC.currentTime + tj + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + tj + 0.14);
    o2.connect(g2); g2.connect(sfxGain);
    o2.start(AC.currentTime + tj); o2.stop(AC.currentTime + tj + 0.18);
  };
  pulse(0, 150); pulse(0.18, 112);
}
function staticTick() { // the Static — a dry burst where a heartbeat should be
  if (!AC) return;
  const dur = rjit(0.12, 0.15), sz = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, sz, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / sz);
  const s = AC.createBufferSource(); s.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = rjit(900, 0.15); bp.Q.value = 2;
  const g = AC.createGain(); g.gain.value = 0.08;
  s.connect(bp); bp.connect(g); g.connect(sfxGain); s.start();
}
function dullThud() { // what boards when there is no heartbeat
  if (!AC) return;
  const f = rjit(90, 0.04), d = rjit(0.3, 0.08);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = "sine"; o.frequency.value = f;
  g.gain.setValueAtTime(0.0001, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.5, AC.currentTime + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
  o.connect(g); g.connect(sfxGain);
  o.start(); o.stop(AC.currentTime + d + 0.05);
}

const PENTATONIC = [220.00, 261.63, 293.66, 329.63, 392.00];
let droneOsc1 = null, droneOsc2 = null;
let musicNoteT = 0, musicNoteNext = 9 + Math.random() * 6, musicArrhythmiaFlip = false;
function startMusic() {
  if (!AC || !musicGain) return;
  droneOsc1 = AC.createOscillator(); droneOsc1.type = "sine"; droneOsc1.frequency.value = 55;
  droneOsc2 = AC.createOscillator(); droneOsc2.type = "triangle"; droneOsc2.frequency.value = 55 * 1.01;
  const droneFilter = AC.createBiquadFilter(); droneFilter.type = "lowpass"; droneFilter.frequency.value = 300;
  const droneGain = AC.createGain(); droneGain.gain.value = 0.06;
  const lfo = AC.createOscillator(); lfo.frequency.value = 0.05;
  const lfoGain = AC.createGain(); lfoGain.gain.value = 150;
  lfo.connect(lfoGain); lfoGain.connect(droneFilter.frequency);
  droneOsc1.connect(droneFilter); droneOsc2.connect(droneFilter);
  droneFilter.connect(droneGain); droneGain.connect(musicGain);
  droneOsc1.start(); droneOsc2.start(); lfo.start();
}
function updateDroneFreq() {
  if (!droneOsc1) return;
  const base = (level && level.isFinale) ? 27.5 : 55;
  droneOsc1.frequency.value = base;
  droneOsc2.frequency.value = base * 1.01;
}
function playMotifNote() {
  if (!AC || !musicGain) return;
  const finale = level && level.isFinale;
  const freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)] * (finale ? 0.5 : 1);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = "sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.05, AC.currentTime + 0.4);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 2.2);
  o.connect(g); g.connect(musicGain);

}
/* the ambient motif ducks under briefings/cards, and — the same diagnostic
   language as the ECG and the haptic tell — goes arrhythmic on its own
   timing while a contaminant is aboard */
function updateMusic(dt) {
  if (!AC || !musicGain) return;
  const ducked = state === "brief" || state === "reveal" || state === "clear" ||
    state === "ending" || state === "help" || state === "codex";
  const target = music ? (ducked ? 0.4 : 1) : 0;
  musicGain.gain.value += (target - musicGain.gain.value) * Math.min(1, dt);
  musicNoteT += dt;
  if (musicNoteT >= musicNoteNext) {
    musicNoteT = 0;
    playMotifNote();
    const finale = level && level.isFinale;
    let base = (finale ? 18 : 9) + Math.random() * (finale ? 12 : 6);
    if (state === "play" && contaminantAboard()) {
      musicArrhythmiaFlip = !musicArrhythmiaFlip;
      base *= musicArrhythmiaFlip ? 0.5 : 1.7;
    }
    musicNoteNext = base;
  }
}

/* ---------------- haptics facade (Bundle F1) ----------------
   On the web this is a no-op; inside the Capacitor wrapper (Bundle E) the
   same calls bridge to native impact haptics — the phone becomes the ECG.
   Every call gates on the HAPTICS setting. Patterns are arrays of
   {delay (ms), style: "light"|"medium"|"heavy"}. */
const haptic = (() => {
  const plugin = () => {
    const C = window.Capacitor;
    return (C && C.isNativePlatform && C.isNativePlatform() &&
            C.Plugins && C.Plugins.Haptics) || null;
  };
  const impact = style => {
    if (!haptics) return;
    const H = plugin();
    if (!H) return;
    try { H.impact({ style: String(style).toUpperCase() }); } catch (e) {}
  };
  return {
    light: () => impact("light"),
    medium: () => impact("medium"),
    heavy: () => impact("heavy"),
    pattern: steps => {
      if (!haptics || !plugin()) return;
      for (const st of steps) setTimeout(() => impact(st.style), st.delay);
    }
  };
})();

/* ---------------- helpers ---------------- */
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

function wrapText(str, maxW) {
  const out = [];
  for (const para of str.split("\n")) {
    let line = "";
    for (const w of para.split(" ")) {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > maxW && line) { out.push(line); line = w; }
      else line = test;
    }
    out.push(line);
  }
  return out;
}

  const pick = minDist => {
    for (let tries = 0; tries < 80; tries++) {
      const x = 600 + rng() * (W - 900);
      if (spots.every(s => Math.abs(s - x) > minDist)) { spots.push(x); return x; }
    }
    return 600 + rng() * (W - 900);
  };

  const PERSONAS = ["wave1", "wave2", "jump", "pace", "sit"];
  const newOid = (x, y, role) => ({ x, y, home: x, state: "wait", wave: rng() * 6,
    role, sleeper: false, famousId: -1, carrier: false, panicT: 0, sabT: 0,
    persona: PERSONAS[Math.floor(rng() * PERSONAS.length)],
    scale: 0.95 + rng() * 0.3, gait: 30 + rng() * 12, nearShip: false });
  for (let i = 0; i < r.oids; i++) {
    const x = pick(280);
    const y = flatten(heights, x, 80);
    lvl.oids.push(newOid(x, y, "normal"));
  }
  // one famous Scion per campaign sector
  if (n < FINALE_IDX && lvl.oids.length) {
    const f = lvl.oids[Math.floor(rng() * lvl.oids.length)];
    f.role = "famous"; f.famousId = n;
  }
  // saboteurs are extra figures, indistinguishable at a distance
  for (let i = 0; i < r.sabs; i++) {
    const x = pick(260);
    const y = flatten(heights, x, 70);
    const sab = newOid(x, y, "saboteur");
    sab.sleeper = n >= 2 && rng() < (n === 6 ? 0.75 : 0.5); // the terraces crawl with sleepers
    lvl.oids.push(sab);
  }
  // two of the ordinary Scions carry log fragments
  const normals = lvl.oids.filter(o => o.role === "normal");
  for (let i = 0; i < Math.min(2, normals.length); i++) {
    normals[Math.floor(rng() * normals.length)].carrier = true;
  }
  lvl.total = lvl.oids.length;

  for (let i = 0; i < r.turrets; i++) {
    const x = pick(220);
    const y = flatten(heights, x, 40);
    lvl.turrets.push({ x, y, cd: 1 + rng() * 2, alive: true, ang: -Math.PI / 2 });
  }
  for (let i = 0; i < r.drones; i++) {
    lvl.drones.push({ x: 900 + rng() * (W - 1200), y: 400 + rng() * 250,
      vx: 0, vy: 0, alive: true, bob: rng() * 6 });
  }
  for (let i = 0; i < r.pods; i++) {
    const x = pick(200);
    lvl.pods.push({ x, y: flatten(heights, x, 30), taken: false, ph: rng() * 7 });
  }
  // Glycon's lures: counterfeit fuel pods that drain the tank instead.
  // The tell — they all blink in perfect, mechanical unison.
  for (let i = 0; i < r.fakes; i++) {
    const x = pick(200);
    lvl.fakePods.push({ x, y: flatten(heights, x, 30), taken: false });
  }
  for (let i = 0; i < r.anomalies; i++) {
    lvl.anomalies.push({ x: 800 + rng() * (W - 1400), y: 500 + rng() * 350,
      r: 200 + rng() * 90, str: 80 + rng() * 40, spin: rng() * 6 });
  }
  // one hidden black box per campaign sector
  if (n < FINALE_IDX) {
    const x = pick(300);
    lvl.blackbox = { x, y: flatten(heights, x, 50), found: false, scanT: 0 };
  }
  // the secret lift: a pad of ground that rings hollow, down into the Hollows
  if (r.lift) {
    const x = pick(320);
    const y = flatten(heights, x, 70);
    lvl.lift = { x, y, cave: LIFT_CAVE[n], holdT: 0, armed: true };
  }
  // the finale's beacon — the source of the Static
  if (n === FINALE_IDX) {
    const bx = W - 420;
    const by = flatten(heights, bx, 120);
    lvl.beacon = { x: bx, y: by, hp: 3, silenceT: 0, resolved: false };
  }

  // ---- scenery: trees, rocks, buildings & ruins, crashed ships ----
  const gy = x => {
    const i = clamp(Math.floor(x / STEP), 0, heights.length - 2);
    const t = clamp(x / STEP - i, 0, 1);
    return lerp(heights[i], heights[i + 1], t);
  };
  const slopeAt = x => (gy(x + 10) - gy(x - 10)) / 20;
  const scnSpot = (flatTries) => { // buildings/wrecks prefer flatter ground
    let x = 320 + rng() * (W - 640);
    for (let k = 0; k < (flatTries || 0); k++) {
      if (Math.abs(slopeAt(x)) < 0.14) break;
      x = 320 + rng() * (W - 640);
    }
    return x;
  };
  const deco = (type, flatTries, extra) => {
    const x = scnSpot(flatTries);
    lvl.scenery.push(Object.assign({ type, x, y: gy(x),
      tilt: Math.atan(slopeAt(x)) * 0.7, s: 0.8 + rng() * 0.7, ph: rng() * 7 }, extra));
  };
  const sc = r.scn;
  for (let i = 0; i < sc.trees; i++) deco("tree", 0);
  for (let i = 0; i < sc.rocks; i++) {
    const verts = [];
    const k = 5 + Math.floor(rng() * 3), rad = 7 + rng() * 9;
    for (let v = 0; v < k; v++) {
      const a = (v / k) * Math.PI * 2;
      const rr = rad * (0.65 + rng() * 0.5);
      verts.push([Math.cos(a) * rr, -rad * 0.6 + Math.sin(a) * rr * 0.62]);
    }
    deco("rock", 0, { verts });
  }
  const mkWindows = (w, h) => {
    const cols = Math.max(2, Math.floor(w / 14)), rows = Math.max(2, Math.floor(h / 16));
    const lit = [];
    for (let i = 0; i < cols * rows; i++) lit.push(rng() < 0.45);
    return { cols, rows, lit, flick: Math.floor(rng() * cols * rows) };
  };
  for (let i = 0; i < sc.bld; i++) {
    const w = 38 + rng() * 28, h = 58 + rng() * 66;
    deco("bld", 10, Object.assign({ w, h }, mkWindows(w, h)));
  }
  for (let i = 0; i < sc.ruin; i++) {
    const w = 40 + rng() * 30, h = 44 + rng() * 50;
    const jag = [];
    for (let j = 0; j <= 4; j++) jag.push(rng() * h * 0.45);
    deco("ruin", 6, Object.assign({ w, h, jag }, mkWindows(w, h * 0.6)));
  }
  for (let i = 0; i < sc.wreck; i++)
    deco(rng() < 0.5 ? "wreckM" : "wreckS", 6, { lean: (rng() - 0.5) * 0.7 });
  // where Glycon seeds lures he also plants a lure-tree: a transmitter
  // disguised as flora, swaying in perfect mechanical time. In the
  // nullwave it is the only tree standing at all.
  if (r.fakes > 0) deco("tree", 0, { fake: true, s: 1 + rng() * 0.3 });
  // and somewhere, someone hid a real cache from the serpent: one rock
  // breathes faintly. Crack it open.
  if (r.fakes > 0) {
    const verts = [];
    for (let v = 0; v < 6; v++) {
      const a = (v / 6) * Math.PI * 2;
      verts.push([Math.cos(a) * 11, -7 + Math.sin(a) * 7]);
    }
    deco("rock", 0, { verts, hollow: true, s: 1.1 });
  }

  stars = [];
  const srng = mulberry32(999 + n);
  for (let i = 0; i < 220; i++)
    stars.push({ x: srng() * W, y: srng() * 900, s: srng() * 1.6 + 0.4, tw: srng() * 6 });
  return lvl;
}

/* ---------------- the Hollows: secret caves under the lifts ---------------- */
function roofAt(x) {
  const h = level.roof;
  const i = clamp(Math.floor(x / STEP), 0, h.length - 2);
  const t = clamp(x / STEP - i, 0, 1);
  return lerp(h[i], h[i + 1], t);
}

function genCave(ci) {
  const W = 1800;
  const rng = mulberry32(5077 + ci * 131);
  const count = Math.floor(W / STEP) + 2;
  const octave = (wl, amp) => {
    const pts = [];
    for (let i = 0; i <= Math.ceil(W / wl) + 1; i++) pts.push((rng() * 2 - 1) * amp);
    return x => {
      const p = x / wl, i = Math.floor(p), t = p - i;
      return lerp(pts[i], pts[i + 1], (1 - Math.cos(t * Math.PI)) / 2);
    };
  };
  const f1 = octave(260, 90), f2 = octave(90, 34);
  const r1 = octave(300, 80), r2 = octave(70, 26);
  const heights = [], roof = [];
  for (let i = 0; i < count; i++) {
    const x = i * STEP;
    heights.push(clamp(1250 + f1(x) + f2(x), 1150, 1380));
    roof.push(clamp(930 + r1(x) + r2(x), 820, 1090));
  }
  for (let i = 0; i < count; i++) roof[i] = Math.min(roof[i], heights[i] - 175);

  const lvl = { n: levelIdx, W, heights, roof, oids: [], turrets: [], bullets: [], shots: [],
    drones: [], pods: [], fakePods: [], anomalies: [], scenery: [],
    blackbox: null, beacon: null, mx: -9999, my: -9999, mxo: 0, myo: 0,
    delivered: 0, lost: 0, contained: 0, total: 0, firedShots: 0,
    extraction: null, pulse: null, dark: true, isFinale: false, isCave: true,
    caveIdx: ci, contamKnown: false, fragmentsHere: [],
    lift: { x: 220, y: 0, cave: ci, holdT: 0, armed: false },
    shrine: null };

  lvl.lift.y = flatten(heights, lvl.lift.x, 60);
  const sx = W - 260;
  const sy = flatten(heights, sx, 80);
  if (!shrines.has(ci)) lvl.shrine = { x: sx, y: sy, found: false, scanT: 0 };

  for (let i = 0; i < 3; i++) {
    const x = 500 + rng() * (W - 900);
    lvl.pods.push({ x, y: flatten(heights, x, 30), taken: false, ph: rng() * 7 });
  }
  if (ci >= 1) lvl.drones.push({ x: W * 0.55, y: 1150, vx: 0, vy: 0, alive: true, bob: rng() * 6 });
  for (let i = 0; i < 5; i++) {
    const verts = [];
    const k = 5 + Math.floor(rng() * 3), rad = 6 + rng() * 8;
    for (let v = 0; v < k; v++) {
      const a = (v / k) * Math.PI * 2;
      verts.push([Math.cos(a) * rad * (0.65 + rng() * 0.5), -rad * 0.55 + Math.sin(a) * rad * 0.55]);
    }
    const x = 300 + rng() * (W - 600);
    const i0 = clamp(Math.floor(x / STEP), 0, heights.length - 2);
    lvl.scenery.push({ type: "rock", x, y: heights[i0], tilt: 0, s: 0.8 + rng() * 0.6, ph: rng() * 7, verts });
  }
  return lvl;
}

let surfaceCtx = null;   // where we came from, while inside a cave
function acctLevel() {   // sector accounting always lands on the surface level
  return level && level.isCave && surfaceCtx ? surfaceCtx.level : level;
}

function enterCave(L) {
  L.holdT = 0; L.armed = false;
  surfaceCtx = { level, x: ship.x, y: ship.y };
  level = genCave(L.cave);
  ship.x = level.lift.x; ship.y = groundAt(level.lift.x) - SHIP_R;
  ship.vx = 0; ship.vy = 0; ship.ang = 0; ship.landed = true;
  camera.x = ship.x; camera.y = ship.y; camera.shake = 14;
  banner("SECRET LIFT — DESCENDING INTO THE HOLLOWS", "#b388ff");
  blip(220, 70, 0.9, "sawtooth", 0.16);
  staticTick();
}

function exitCave() {
  if (!surfaceCtx) return;
  level = surfaceCtx.level;
  ship.x = surfaceCtx.x;
  // Land ON the pad, not in it: surfaceCtx.y was captured mid-lift-transit,
  // after the descent animation had already sunk the ship ~40px into the
  // pad, so restoring it verbatim left the ship embedded below ground on
  // the way back up (it then "snapped" to the surface on the first thrust).
  // Recompute from the restored surface heightmap instead.
  ship.y = groundAt(ship.x) - SHIP_R;
  ship.vx = 0; ship.vy = 0; ship.ang = 0; ship.landed = true;
  if (level.lift) { level.lift.holdT = 0; level.lift.armed = false; }
  camera.x = ship.x; camera.y = ship.y; camera.shake = 10;
  surfaceCtx = null;
  banner("SURFACE — " + SECTOR_NAMES[levelIdx], "#00e5ff");
  blip(160, 520, 0.6, "sine", 0.12);
}

function maxVitals() { return upgrades.fabrica ? 125 : 100; }
function lampRadius() {
  // the lamp itself falters while the Static surges (Bundle I2)
  return (upgrades.lamp ? 400 : 230) * (staticSurge > 0 ? 0.92 : 1);
}

function spawnShip() {
  ship = {
    x: level.mx, y: level.my + 90, vx: 0, vy: 0, ang: 0,
    fuel: 100, vitals: maxVitals(), passengers: [], landed: false, dead: false,
    fireCd: 0, dockT: 0, redDockT: 0, beat: 0, escapeT: 0, breachDockT: 0,
    shield: false, signalT: 0
  };
}

/* ---------------- state flow ---------------- */
function resetRun() {
  score = 0; lives = startLives(); runSaved = 0; runLost = 0; runFired = 0;
  firedAtSecret = false; firedAtCombat = false;
  runFragments = 0; blackboxCount = 0; shrines = new Set();
  upgrades = {}; mercyBreach = null; mercyDamaged = false; endingType = null;
  clearCards = []; revealCard = null; surfaceCtx = null;
  checkpoint = null;
  clearRun();
}

function toBriefing(n) {
  levelIdx = n;
  surfaceCtx = null;
  level = genLevel(n);
  spawnShip();
  camera = { x: ship.x, y: ship.y, shake: 0 };
  particles = []; texts = [];
  mercyBreach = null; mercyDamaged = false;
  resupplyDrone = null; liftTransit = null;
  state = "brief"; stateT = 0; briefChars = 0;
  staticClock = 0; staticSurge = 0; staticGlitchT = 0;
  snapshotRun();
  updateDroneFreq();
}

/* Bundle I — the 41-second clock. "Repeating, every 41 seconds" stops being
   lore and becomes observable: from Curie Fields onward (where the briefing
   first names the figure) and everywhere down in the Hollows, the whole
   world flinches on the Static's own period. Diagnostic atmosphere, not a
   hazard — the player's reward for noticing is understanding, not damage. */
const STATIC_PERIOD = 41.0;
let staticClock = 0, staticSurge = 0, staticGlitchT = 0;
function updateStaticClock(dt) {
  staticSurge = Math.max(0, staticSurge - dt);
  staticGlitchT = Math.max(0, staticGlitchT - dt);
  if (!(levelIdx >= 4 || level.isCave)) return;
  staticClock += dt;
  if (staticClock < STATIC_PERIOD) return;
  staticClock -= STATIC_PERIOD;
  staticTick();
  // a "wrong" double-tick, distinct from the heartbeat's lub-dub (F2)
  haptic.pattern([{ delay: 0, style: "light" }, { delay: 40, style: "light" }]);
  staticGlitchT = 0.12;
  if (level.isFinale && level.beacon && !level.beacon.resolved) {
    // the beacon surges on the same phase, but strong — the closer you fly
    // to SOLACE, the harder the world flinches with her (I3)
    const d = Math.hypot(ship.x - level.beacon.x, ship.y - level.beacon.y);
    const near = 1 - clamp(d / 2200, 0, 1);
    staticSurge = 1.2;
    camera.shake += 2 + 4 * near;
  } else {
    staticSurge = 0.6;
  }
}

let bannerMsg = null;
function banner(str, color) { bannerMsg = { str, color, t: 2.6 }; }
function addText(x, y, str, color) { texts.push({ x, y, str, color, t: 1.6 }); }

function showCard(card) { revealCard = card; state = "reveal"; stateT = 0; }

function grantFragment(queueForClear) {
  if (runFragments >= FRAGMENTS.length) { score += 500; return null; }
  const frag = FRAGMENTS[runFragments++];
  if (queueForClear) level.fragmentsHere.push(frag);
  return frag;
}

function explode(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 220;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      t: 0.5 + Math.random() * 0.8, max: 1.3, color, size: 1.5 + Math.random() * 3 });
  }
  camera.shake = Math.min(camera.shake + 14, 26);
  // nearby grounded Scions panic
  if (level) for (const o of level.oids) {
    if ((o.state === "wait" || o.state === "walk") && Math.abs(o.x - x) < 160 && Math.abs(o.y - y) < 160) {
      o.state = "panic"; o.panicT = 1.6 + Math.random();
    }
  }
  boom();
}

function goldBurst(x, y) {
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2, sp = 30 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      t: 0.6 + Math.random() * 0.8, max: 1.4, color: "#ffd54f", size: 1.5 + Math.random() * 2.5 });
  }
}

/* ---------------- landing rules ---------------- */
function landingEval() {
  const s = ship;
  const slope = Math.abs(groundAt(s.x + 10) - groundAt(s.x - 10)) / 20;
  const tilt = Math.abs(((s.ang % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
  const upright = tilt < 0.5;
  const tol = easyMode ? 1.3 : 1;           // FIELD MEDIC widens every tolerance
  const vyMax = (upgrades.gentle ? 62 : 52) * tol;
  const vxMax = 38 * tol, slopeMax = 0.25 * tol;
  const soft = Math.abs(s.vy) < vyMax && Math.abs(s.vx) < vxMax && slope < slopeMax && upright;
  const survivable = Math.abs(s.vy) < (upgrades.gentle ? 100 : 85) * tol &&
    Math.abs(s.vx) < 60 * tol && slope < 0.35 * tol && upright;
  let reason = "";
  if (!upright) reason = "LEVEL THE SHIP";
  else if (slope >= slopeMax) reason = "GROUND TOO STEEP";
  else if (Math.abs(s.vy) >= vyMax) reason = "DESCENDING TOO FAST";
  else if (Math.abs(s.vx) >= vxMax) reason = "DRIFTING SIDEWAYS";
  return { soft, survivable, reason };
}

function shipDie() {
  if (ship.dead) return;
  ship.dead = true;
  explode(ship.x, ship.y, "#ff4081", 60);
  explode(ship.x, ship.y, "#ffc400", 40);
  if (ship.passengers.length > 0) {
    const n = ship.passengers.length;
    for (const p of ship.passengers) {
      p.state = "lost";
      if (p.role === "famous") {
        addText(ship.x, ship.y - 66, "YOU LOST " + FAMOUS[p.famousId].name, "#ffd54f");
      }
    }
    acctLevel().lost += n; runLost += n;
    const penalty = 250 * n;
    score = Math.max(0, score - penalty);
    addText(ship.x, ship.y - 50,
      n + (n === 1 ? " SCION LOST" : " SCIONS LOST") + "  -" + penalty, "#ff4081");
    explode(ship.x, ship.y - 12, "#69f0ae", 24);
    ship.passengers = [];
  }
  lives--;
  state = "dead"; stateT = 0;
}

/* When every Scion is accounted for (saved, lost, or contained), MERCY
   closes her manifest and spools the jump drive — she has been holding
   the Static off her systems the whole time, and the moment she stops
   stationkeeping to spool, it starts to reach her. The extraction dock
   is the sector's final exam: dock with a drifting mothership while
   the pulses quicken. Checked every play frame so no accounting path
   (delivery, crash, sabotage, quarantine, escape) can be missed. */
function checkSectorClear() {
  if (state !== "play" || level.isCave || level.isFinale || level.extraction || mercyBreach) return;
  if (level.delivered + level.lost + level.contained < level.total) return;
  level.extraction = { t: 0, pulseT: 0, hold: 0 };
  banner("MANIFEST CLOSED — MERCY IS SPOOLING TO JUMP\nDOCK IN THE RECOVERY BAY BEFORE THE STATIC REACHES HER", "#ffc400");
  blip(660, 220, 0.6, "sawtooth", 0.15);
}

function sectorClearNow() {
  score += 1000;
  if (level.firedShots === 0) score += 2000;
  bannerMsg = null;
  clearCards = level.fragmentsHere.map(f => ({
    kicker: "LOG FRAGMENT RECOVERED", title: "", body: f, color: "#00e5ff" }));
  state = "clear"; stateT = 0;
  blip(440, 1760, 0.5, "sine", 0.15);
}

function updateExtraction(dt) {
  const e = level.extraction;
  e.t += dt;
  // MERCY drifts harder the longer you take
  level.mxo = Math.sin(e.t * 0.55) * Math.min(60, 8 + e.t * 2.2);
  level.myo = Math.sin(e.t * 1.15) * Math.min(30, 5 + e.t * 1.1);
  // the Static surges in quickening pulses that shove your ship
  e.pulseT += dt;
  if (e.pulseT >= Math.max(2.8, 6.5 - e.t * 0.09)) {
    e.pulseT = 0;
    level.pulse = { t: 0 };
    staticTick();
    const { mx, my } = mercyPos();
    const dx = ship.x - mx, dy = ship.y - my, d = Math.hypot(dx, dy) || 1;
    if (d < 600 && !ship.landed && !ship.dead) {
      const kick = 110 * (1 - d / 600);
      ship.vx += dx / d * kick; ship.vy += dy / d * kick;
      camera.shake += 8;
      addText(ship.x, ship.y - 30, "THE STATIC SURGES", "#b388ff");
    }
  }
  if (level.pulse && (level.pulse.t += dt) > 1.2) level.pulse = null;
  if (!ship.dead && inBay(bayRects().med)) {
    e.hold += dt;
    if (e.hold >= 1.5) sectorClearNow();
  } else e.hold = 0;
}

function triggerBreach() {
  mercyBreach = { t: easyMode ? 60 : 45 };
  level.contamKnown = true;
  banner("SECURITY BREACH ABOARD MERCY\nDOCK AT THE RED BAY TO CONTAIN IT", "#ff4081");
  blip(880, 220, 0.6, "sawtooth", 0.2);
}

function resolveBreach(success) {
  mercyBreach = null;
  if (success) {
    score += 750;
    banner("CONTAMINANT CONTAINED  +750\nLOCKDOWN LIFTED", "#69f0ae");
    blip(520, 1040, 0.3, "sine", 0.15);
  } else {
    score = Math.max(0, score - 1000);
    mercyDamaged = true;
    banner("RECOVERY BAY SABOTAGED  -1000\nHEALING OFFLINE THIS SECTOR", "#ff4081");
    blip(300, 60, 0.6, "sawtooth", 0.2);
  }
}

/* ---------------- update ---------------- */
let ctlShown = null;
function updateCtlVisibility() {
  // virtual controls exist only in flight — not on the title, intro,
  // briefings, or story cards
  const want = state === "play" || state === "dead";
  if (want === ctlShown) return;
  ctlShown = want;
  document.body.classList.toggle("noctl", !want);
  if (!want) for (const b of btnEls) {
    input[b.key] = false;
    b.el.classList.remove("down");
  }
}

function update(dt) {
  stateT += dt;
  pollPad();
  updateCtlVisibility();
  updateMusic(dt);
  if (bannerMsg && (bannerMsg.t -= dt) <= 0) bannerMsg = null;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t -= dt; if (p.t <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += GRAV * 0.6 * dt;
  }
  for (let i = texts.length - 1; i >= 0; i--) {
    texts[i].t -= dt; texts[i].y -= 24 * dt;
    if (texts[i].t <= 0) texts.splice(i, 1);
  }
  if (camera) camera.shake = Math.max(0, camera.shake - 60 * dt);

  // portrait: hold the game and show the rotate prompt instead
  if (vh > vw) {
    if (thrustGain) thrustGain.gain.value = 0;
    input.tap = false;
    return;
  }

  // thrust noise is a loop tied to whatever updatePlay last set it to; any
  // transition away from "play" (a card, pause, game over, sector clear,
  // the lift transit freeze…) must not leave it running behind the panel.
  // Zeroed here every frame, then updatePlay sets the real value right back
  // if flight is actually still live.
  if (thrustGain) thrustGain.gain.value = 0;

  switch (state) {
    case "title": case "gameover": case "win": updateMenu(); return;
    case "intro": updateIntro(dt); return;
    case "help": case "codex":
      if (input.tap && stateT > 0.4) { state = "title"; stateT = 0.7; }
      input.tap = false; return;
    case "brief": updateBrief(dt); return;
    case "reveal":
      if (input.tap && stateT > 0.4) { revealCard = null; state = "play"; }
      input.tap = false; return;
    case "clear": updateClear(); return;
    case "ending":
      if (input.tap && stateT > 1) { state = "win"; stateT = 0; saveHi(); clearRun(); }
      input.tap = false; return;
    case "dead":
      if (stateT > 1.6) {
        if (lives <= 0) {
          checkpoint = savedRun; clearRun();
          state = "gameover"; stateT = 0; saveHi();
        } else {
          if (level.isCave) exitCave();   // the Hollows spit you back out
          spawnShip(); state = "play"; stateT = 0; checkSectorClear();
        }
      }
      input.tap = false;
      return;
    case "pause": updatePause(); return;
    case "settings": updateSettings(); return;
    case "play": updatePlay(dt); return;
  }
}

function saveHi() {
  if (score > hiscore) { hiscore = score; try { localStorage.setItem("doids_hi", hiscore); } catch (e) {} }
}

let introIdx = 0;
function updateMenu() {
  if (input.tap && stateT > 0.6) {
    if (state === "title" && inRect(settingsRect(), input.tapX, input.tapY)) {
      settingsReturnState = "title"; state = "settings"; stateT = 0;
      blip(440, 660, 0.1, "sine", 0.08);
    } else if (state === "title" && inRect(helpRect(), input.tapX, input.tapY)) {
      state = "help"; stateT = 0;
      blip(440, 660, 0.1, "sine", 0.08);
    } else if (state === "title" && inRect(codexRect(), input.tapX, input.tapY)) {
      state = "codex"; stateT = 0;
      blip(550, 825, 0.1, "sine", 0.08);
    } else if (state === "title" && inRect(storyRect(), input.tapX, input.tapY)) {
      // rewatch the opening narrative (it flows into a new run)
      goFullscreen();
      if (window.hideA2HS) window.hideA2HS();
      resetRun();
      introIdx = 0;
      state = "intro"; stateT = 0;
      blip(330, 660, 0.2, "sine", 0.1);
    } else if (state === "title" && savedRun && inRect(resumeRect(), input.tapX, input.tapY)) {
      goFullscreen();
      if (window.hideA2HS) window.hideA2HS();
      restoreRun(savedRun);
      toBriefing(levelIdx);
      blip(330, 660, 0.2, "sine", 0.1);
    } else if (state === "gameover" && checkpoint && inRect(continueRect(), input.tapX, input.tapY)) {
      const r = checkpoint;
      restoreRun(r);
      score = Math.floor(r.score * 0.75);
      lives = startLives();
      checkpoint = null;
      toBriefing(r.levelIdx);
      blip(330, 660, 0.2, "sine", 0.1);
    } else {
      goFullscreen();
      if (window.hideA2HS) window.hideA2HS();
      resetRun();
      if (introSeen) {
        toBriefing(0);   // veterans launch straight into the tasking
      } else {
        introIdx = 0;
        state = "intro"; stateT = 0;
      }
      blip(330, 660, 0.2, "sine", 0.1);
    }
  }
  input.tap = false;
}

let introBeat = 0;
function updateIntro(dt) {
  // a slow heartbeat under the story — except the failure panel,
  // where the Static answers instead
  introBeat += dt;
  const cyc = introIdx === 3 ? 1.4 : 1.5;
  if (introBeat >= cyc) {
    introBeat = 0;
    if (introIdx === 3) staticTick(); else heartbeat(0.55);
  }
  if (input.tap && stateT > 0.35) {
    if (inRect(skipRect(), input.tapX, input.tapY)) { markIntroSeen(); toBriefing(0); }
    else {
      introIdx++; stateT = 0;
      blip(440, 550, 0.08, "sine", 0.07);
      if (introIdx >= INTRO.length) { markIntroSeen(); toBriefing(0); }
    }
  }
  input.tap = false;
}

function updateBrief(dt) {
  const full = BRIEFS[levelIdx].length;
  briefChars = Math.min(full, briefChars + dt * 55);
  if (input.tap && stateT > 0.5) {
    if (briefChars < full) briefChars = full;
    else { state = "play"; stateT = 0; banner(SECTOR_NAMES[levelIdx], "#00e5ff"); }
  }
  input.tap = false;
}

function updateClear() {
  if (input.tap && stateT > 0.8) {
    if (clearCards.length > 0) { clearCards.shift(); stateT = Math.max(stateT, 0.81); }
    else if (levelIdx < FINALE_IDX - 1) toBriefing(levelIdx + 1);
    else if (levelIdx === FINALE_IDX - 1) {
      if (blackboxCount >= 3) toBriefing(FINALE_IDX);
      else { endingType = "unresolved"; state = "ending"; stateT = 0; }
    } else { state = "ending"; stateT = 0; }
  }
  input.tap = false;
}

function updatePause() {
  if (thrustGain) thrustGain.gain.value = 0;
  if (input.tap && stateT > 0.25) {
    if (inRect(pauseRowRect(0), input.tapX, input.tapY)) { state = "play"; stateT = 0; }
    else if (inRect(pauseRowRect(1), input.tapX, input.tapY)) { toBriefing(levelIdx); }
    else if (inRect(pauseRowRect(2), input.tapX, input.tapY)) {
      settingsReturnState = "pause"; state = "settings"; stateT = 0;
    }
    else if (inRect(pauseRowRect(3), input.tapX, input.tapY)) { snapshotRun(); state = "title"; stateT = 0; }
  }
  input.tap = false;
}

let settingsReturnState = "title";
function updateSettings() {
  if (input.tap && stateT > 0.3) {
    let hit = false;
    for (let i = 0; i < 8; i++) {
      if (i === 4) continue;   // TILT is handled synchronously in canvasTap()
      if (inRect(settingsRowRect(i), input.tapX, input.tapY)) {
        hit = true;
        if (i === 0) {
          sound = !sound;
          try { localStorage.setItem("doids_snd", sound ? "1" : "0"); } catch (e) {}
          if (sfxGain) sfxGain.gain.value = sound ? 1 : 0;
          blip(sound ? 440 : 300, sound ? 660 : 200, 0.12, "sine", 0.1);
        } else if (i === 1) {
          music = !music;
          try { localStorage.setItem("doids_mus", music ? "1" : "0"); } catch (e) {}
          blip(440, 660, 0.1, "sine", 0.08);
        } else if (i === 2) {
          haptics = !haptics;
          try { localStorage.setItem("doids_hapt", haptics ? "1" : "0"); } catch (e) {}
          blip(440, 660, 0.1, "sine", 0.08);
        } else if (i === 3) {
          assist = !assist;
          try { localStorage.setItem("doids_assist", assist ? "1" : "0"); } catch (e) {}
          blip(assist ? 440 : 300, assist ? 660 : 200, 0.12, "sine", 0.1);
        } else if (i === 5) {
          colorblind = !colorblind;
          try { localStorage.setItem("doids_cb", colorblind ? "1" : "0"); } catch (e) {}
          blip(440, 660, 0.1, "sine", 0.08);
        } else if (i === 6) {
          // FIELD MEDIC applies to the NEXT run — a live run keeps the
          // difficulty it launched with (lives/tolerances mid-run would
          // be a silent cheat toggle otherwise)
          easyMode = !easyMode;
          try { localStorage.setItem("doids_easy", easyMode ? "1" : "0"); } catch (e) {}
          blip(easyMode ? 440 : 300, easyMode ? 660 : 200, 0.12, "sine", 0.1);
        } else if (i === 7) {
          bigText = !bigText;
          try { localStorage.setItem("doids_bigtext", bigText ? "1" : "0"); } catch (e) {}
          blip(440, 660, 0.1, "sine", 0.08);
        }
      }
    }
    if (!hit) { state = settingsReturnState || "title"; stateT = 0; }
  }
  input.tap = false;
}

function updatePlay(dt) {
  if (liftTransit) { updateLiftTransit(dt); return; }
  if (input.tap && inRect(pauseRect(), input.tapX, input.tapY)) {
    input.tap = false;
    state = "pause"; stateT = 0;
    return;
  }
  input.tap = false;
  const s = ship;
  const now = performance.now() / 1000;

  let steer = 0;
  if (input.left || pad.left) steer -= 1;
  if (input.right || pad.right) steer += 1;
  if (steer === 0) steer = gyroSteerVal();
  if (steer) s.ang += ROT * dt * steer;

  if (assist && !s.landed && !steer) {
    const tilt = ((s.ang % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
    if (Math.abs(tilt) < ASSIST_CAPTURE) s.ang = tilt * Math.max(0, 1 - ASSIST_RATE * dt);
  }

  // force field: eats fuel, stops bullets, drones, rough ground and cave roofs
  s.shield = (input.shield || pad.shield) && s.fuel > 0 && !s.dead;
  if (s.shield) s.fuel = Math.max(0, s.fuel - 7 * dt);

  const thrusting = (input.thrust || pad.thrust) && s.fuel > 0;
  if (thrustGain) thrustGain.gain.value = thrusting ? 0.14 : 0;
  if (thrusting) {
    s.vx += Math.sin(s.ang) * THRUST * dt;
    s.vy -= Math.cos(s.ang) * THRUST * dt;
    s.fuel = Math.max(0, s.fuel - 5.2 * dt);
    s.landed = false;
    for (let i = 0; i < 2; i++) {
      const spread = (Math.random() - 0.5) * 0.5;
      particles.push({
        x: s.x - Math.sin(s.ang) * 12, y: s.y + Math.cos(s.ang) * 12,
        vx: s.vx - Math.sin(s.ang + spread) * 160, vy: s.vy + Math.cos(s.ang + spread) * 160,
        t: 0.25 + Math.random() * 0.2, max: 0.45,
        color: Math.random() < 0.5 ? "#ffc400" : "#ff6d00", size: 2 + Math.random() * 2
      });
    }
    // friendly fire: hovering your exhaust over someone is malpractice
    const exX = s.x - Math.sin(s.ang) * 16, exY = s.y + Math.cos(s.ang) * 16;
    for (const o of level.oids) {
      if ((o.state === "wait" || o.state === "walk" || o.state === "panic") &&
          Math.abs(o.x - exX) < 26 && o.y - exY > -6 && o.y - exY < 46) {
        o.scorch = (o.scorch || 0) + dt * 2.2;
        if (o.scorch > 0.5) killOid(o, "torched");
      } else if (o.scorch) o.scorch = Math.max(0, o.scorch - dt);
    }
  }

  // gravity anomalies pull the ship toward their centres
  for (const a of level.anomalies) {
    const dx = a.x - s.x, dy = a.y - s.y, d = Math.hypot(dx, dy);
    if (d < a.r && d > 1 && !s.landed) {
      const f = a.str * (1 - d / a.r);
      s.vx += dx / d * f * dt; s.vy += dy / d * f * dt;
    }
  }

  if (!s.landed) {
    s.vy += GRAV * dt;
    s.x += s.vx * dt; s.y += s.vy * dt;
  }

  s.x = clamp(s.x, BOUND_X, level.W - BOUND_X);
  if (s.y < BOUND_Y) { s.y = BOUND_Y; s.vy = Math.max(s.vy, 0); }

  // cave roofs are unforgiving — unless the field is up
  if (level.roof && !s.dead && !s.landed) {
    const rY = roofAt(s.x);
    if (s.y - SHIP_R <= rY) {
      if (s.shield) {
        s.y = rY + SHIP_R + 1;
        s.vy = Math.abs(s.vy) * 0.5 + 20;
        s.fuel = Math.max(0, s.fuel - 4);
        camera.shake += 6;
        blip(240, 420, 0.12, "sine", 0.1);
      } else { shipDie(); return; }
    }
  }

  const g = groundAt(s.x);
  if (!s.landed && s.y + SHIP_R >= g) {
    const { soft, survivable } = landingEval();
    if (soft) {
      s.landed = true; s.y = g - SHIP_R; s.vx = 0; s.vy = 0; s.ang = 0;
    } else if (s.shield) {
      // the force field turns a bad approach into a bounce
      s.y = g - SHIP_R;
      s.vy = -Math.abs(s.vy) * 0.45; s.vx *= 0.65;
      s.fuel = Math.max(0, s.fuel - 4);
      camera.shake += 6;
      addText(s.x, s.y - 30, "SHIELD BOUNCE", "#69f0ae");
      blip(200, 380, 0.15, "sine", 0.12);
    } else if (survivable) {
      s.landed = true; s.y = g - SHIP_R; s.vx = 0; s.vy = 0; s.ang = 0;
      const dmg = upgrades.gentle ? 12 : 35;
      s.vitals -= dmg; camera.shake += 10;
      addText(s.x, s.y - 30, "HARD LANDING -" + dmg, "#ff4081");
      blip(160, 40, 0.3, "sawtooth", 0.2);
      if (s.vitals <= 0) { shipDie(); return; }
    } else { shipDie(); return; }
  }

  updateOids(dt, now);
  updateEnemies(dt);
  updateSabotage(dt);
  updateDocking(dt);
  updateBlackbox(dt);
  updatePods();
  updateResupplySignal(dt);
  updateLift(dt);
  updateShrine(dt);
  updateStaticClock(dt);
  if (level.isFinale) updateBeacon(dt);

  if (mercyBreach) {
    mercyBreach.t -= dt;
    if (mercyBreach.t <= 0) resolveBreach(false);
  }

  if (level.extraction && state === "play") updateExtraction(dt);
  checkSectorClear();

  s.beat = Math.max(0, s.beat - dt);
  camera.x = lerp(camera.x, s.x + s.vx * 0.35, 1 - Math.pow(0.001, dt));
  camera.y = lerp(camera.y, s.y + s.vy * 0.2 - 40, 1 - Math.pow(0.001, dt));
}

function updateOids(dt, now) {
  const s = ship;
  for (const o of level.oids) {
    o.wave += dt;
    if (o.state === "dying") {
      o.deathT += dt;
      if (o.deathType === "torched") {
        // staggering about in flames
        o.x += Math.sin(o.deathT * 22) * 44 * dt;
        o.y = groundAt(o.x);
        if (Math.random() < 0.6) particles.push({
          x: o.x + (Math.random() - 0.5) * 8, y: o.y - 12 - Math.random() * 12,
          vx: (Math.random() - 0.5) * 30, vy: -50 - Math.random() * 40,
          t: 0.4, max: 0.5,
          color: Math.random() < 0.5 ? "#ffc400" : "#ff6d00", size: 2.5 });
      }
      if (o.deathT >= 1.3) {
        o.state = "lost";
        level.lost++; runLost++;
        const fam = o.role === "famous";
        const pen = fam ? 500 : 250;
        score = Math.max(0, score - pen);
        addText(o.x, o.y - 40,
          (fam ? "YOU KILLED " + FAMOUS[o.famousId].name : "MALPRACTICE") + "  -" + pen,
          fam ? "#ffd54f" : "#ff4081");
        explode(o.x, o.y - 8, o.deathType === "torched" ? "#ff6d00" : "#69f0ae", 18);
      }
      continue;
    }
    if (o.state === "wait") {
      o.nearShip = Math.abs(s.x - o.x) < 240 && Math.abs(s.y - o.y) < 180;
      if (o.persona === "pace") {
        o.x = o.home + Math.sin((now + o.wave * 3) * 0.7) * 26;
        o.y = groundAt(o.x);
      }
    }
    if (o.state === "panic") {
      o.panicT -= dt;
      o.x += Math.sin(now * 7 + o.wave * 9) * 60 * dt;
      o.x = clamp(o.x, o.home - 70, o.home + 70);
      o.y = groundAt(o.x);
      if (o.panicT <= 0) o.state = "wait";
      continue;
    }
    if (o.state === "wait" && s.landed &&
        Math.abs(s.x - o.x) < 150 && Math.abs(groundAt(o.x) - (s.y + SHIP_R)) < 60) {
      o.state = "walk";
    }
    if (o.state === "walk") {
      if (!s.landed) { o.state = "wait"; continue; }
      const speed = o.role === "saboteur" ? 40 : 34; // a touch too eager
      o.x += Math.sign(s.x - o.x) * speed * dt;
      o.y = groundAt(o.x);
      if (Math.abs(s.x - o.x) < 14) {
        if (s.passengers.length >= CAPACITY) {
          addText(s.x, s.y - 34, "SHIP FULL", "#ffc400");
          o.state = "wait"; o.x = s.x + 20 * Math.sign(o.x - s.x || 1);
          continue;
        }
        o.state = "aboard";
        s.passengers.push(o);
        score += 500;
        s.beat = 1;
        if (o.role === "saboteur") {
          dullThud(); // no heartbeat. Listen closely.
          o.sabT = 6 + Math.random() * 3;
          addText(s.x, s.y - 34, "SCION ABOARD +500", "#69f0ae");
        } else {
          heartbeat();
          addText(s.x, s.y - 34, "SCION ABOARD +500", "#69f0ae");
          if (o.carrier) addText(s.x, s.y - 48, "◇ CARRYING DATA", "#00e5ff");
          if (o.role === "famous") {
            goldBurst(s.x, s.y - 10);
            banner("SOMEONE EXTRAORDINARY IS ABOARD…", "#ffd54f");
            blip(660, 1320, 0.3, "sine", 0.12);
          }
        }
      }
    }
  }
}

function updateEnemies(dt) {
  const s = ship;
  for (const t of level.turrets) {
    if (!t.alive) continue;
    const dx = s.x - t.x, dy = s.y - (t.y - 10);
    const d = Math.hypot(dx, dy);
    const target = Math.atan2(dy, dx);
    t.ang += clamp(target - t.ang, -1.6 * dt, 1.6 * dt);
    t.cd -= dt;
    if (d < 500 && t.cd <= 0 && !s.dead) {
      t.cd = 1.5 + Math.random() * 0.9;
      level.bullets.push({ x: t.x + Math.cos(t.ang) * 14, y: t.y - 10 + Math.sin(t.ang) * 14,
        vx: Math.cos(t.ang) * 150, vy: Math.sin(t.ang) * 150, t: 4 });
      blip(300, 90, 0.18, "square", 0.07);
    }
  }

  for (const dr of level.drones) {
    if (!dr.alive) continue;
    dr.bob += dt;
    const dx = s.x - dr.x, dy = s.y - dr.y, d = Math.hypot(dx, dy) || 1;
    if (d < 700) { dr.vx += dx / d * 60 * dt; dr.vy += dy / d * 60 * dt; }
    const sp = Math.hypot(dr.vx, dr.vy);
    if (sp > 95) { dr.vx *= 95 / sp; dr.vy *= 95 / sp; }
    dr.x += dr.vx * dt; dr.y += dr.vy * dt + Math.sin(dr.bob * 3) * 8 * dt;
    dr.y = Math.min(dr.y, groundAt(dr.x) - 26);
    if (level.roof) dr.y = Math.max(dr.y, roofAt(dr.x) + 26);
    if (!s.dead && d < SHIP_R + (s.shield ? 14 : 10)) {
      dr.alive = false;
      explode(dr.x, dr.y, "#ff4081", 24);
      if (s.shield) {
        addText(s.x, s.y - 30, "SHIELD HELD", "#69f0ae");
      } else {
        s.vitals -= 40;
        addText(s.x, s.y - 30, "-40", "#ff4081");
        if (s.vitals <= 0) { shipDie(); return; }
      }
    }
  }

  for (let i = level.bullets.length - 1; i >= 0; i--) {
    const b = level.bullets[i];
    b.t -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.t <= 0 || b.y > groundAt(b.x)) { level.bullets.splice(i, 1); continue; }
    if (!s.dead && Math.hypot(b.x - s.x, b.y - s.y) < SHIP_R + (s.shield ? 10 : 3)) {
      level.bullets.splice(i, 1);
      if (s.shield) {
        explode(b.x, b.y, "#69f0ae", 8);
        blip(500, 900, 0.08, "sine", 0.08);
        continue;
      }
      s.vitals -= 26; camera.shake += 8;
      explode(b.x, b.y, "#ff4081", 10);
      addText(s.x, s.y - 30, "-26", "#ff4081");
      if (s.vitals <= 0) { shipDie(); return; }
    }
  }

  s.fireCd -= dt;
  if ((input.fire || pad.fire) && s.fireCd <= 0 && !s.dead) {
    s.fireCd = 0.22;
    acctLevel().firedShots++; runFired++;
    level.shots.push({ x: s.x + Math.sin(s.ang) * 14, y: s.y - Math.cos(s.ang) * 14,
      vx: s.vx + Math.sin(s.ang) * 360, vy: s.vy - Math.cos(s.ang) * 360, t: 1.3 });
    blip(880, 180, 0.12, "square", 0.09);
  }
  for (let i = level.shots.length - 1; i >= 0; i--) {
    const b = level.shots[i];
    b.t -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
    let gone = b.t <= 0 || b.y > groundAt(b.x) || (level.roof && b.y < roofAt(b.x));
    for (const t of level.turrets) {
      if (t.alive && Math.hypot(b.x - t.x, b.y - (t.y - 8)) < 18) {
        t.alive = false; gone = true; firedAtCombat = true;
        score += 250;
        explode(t.x, t.y - 8, "#ffc400", 30);
        addText(t.x, t.y - 40, "+250", "#ffc400");
      }
    }
    for (const dr of level.drones) {
      if (dr.alive && Math.hypot(b.x - dr.x, b.y - dr.y) < 16) {
        dr.alive = false; gone = true; firedAtCombat = true;
        score += 150;
        explode(dr.x, dr.y, "#ff4081", 22);
        addText(dr.x, dr.y - 30, "+150", "#ff4081");
      }
    }
    // friendly fire: a stray shot can hit the very Scion you came for
    for (const o of level.oids) {
      if ((o.state === "wait" || o.state === "walk" || o.state === "panic") &&
          Math.hypot(b.x - o.x, b.y - (o.y - 12)) < 12) {
        gone = true;
        killOid(o, "shot");
      }
    }
    // Glycon's secrets crack open under fire
    for (const sc of level.scenery) {
      if (sc.dead) continue;
      if (sc.fake && Math.hypot(b.x - sc.x, b.y - (sc.y - 30 * sc.s)) < 24 * sc.s) {
        sc.dead = true; gone = true; firedAtSecret = true;
        score += 500;
        explode(sc.x, sc.y - 24, "#c6ff00", 26);
        staticTick();
        addText(sc.x, sc.y - 56, "LURE-TREE DESTROYED — GLYCON TRANSMITTER +500", "#c6ff00");
      } else if (sc.hollow && Math.hypot(b.x - sc.x, b.y - (sc.y - 8 * sc.s)) < 16 * sc.s) {
        sc.dead = true; gone = true; firedAtSecret = true;
        score += 400;
        explode(sc.x, sc.y - 8, "#ffc400", 20);
        level.pods.push({ x: sc.x, y: sc.y, taken: false, ph: Math.random() * 7 });
        addText(sc.x, sc.y - 44, "HIDDEN CACHE +400 — stashed away from the serpent", "#ffc400");
        blip(400, 1200, 0.3, "sine", 0.12);
      }
    }
    if (level.beacon && !level.beacon.resolved &&
        Math.hypot(b.x - level.beacon.x, b.y - (level.beacon.y - 40)) < 42) {
      gone = true;
      level.beacon.hp--;
      explode(level.beacon.x, level.beacon.y - 40, "#b388ff", 20);
      if (level.beacon.hp <= 0) resolveBeacon("fire");
    }
    if (gone) level.shots.splice(i, 1);
  }
}

function updateSabotage(dt) {
  const s = ship;
  for (const p of s.passengers) {
    if (p.role !== "saboteur" || p.sleeper) continue;
    p.sabT -= dt;
    if (p.sabT > 0) continue;
    p.sabT = 7 + Math.random() * 4;
    acctLevel().contamKnown = true;
    level.contamKnown = true;
    // Jenner's gift: immunised passengers can't be killed, only inconvenienced
    if (upgrades.inoculation || Math.random() < 0.55 || s.passengers.length === 1) {
      s.fuel = Math.max(0, s.fuel - (easyMode ? 4.5 : 9));
      addText(s.x, s.y - 34, "FUEL LINE CUT", "#ff4081");
      blip(140, 60, 0.25, "sawtooth", 0.12);
    } else {
      const victims = s.passengers.filter(q => q.role !== "saboteur");
      if (victims.length) {
        const v = victims[Math.floor(Math.random() * victims.length)];
        s.passengers.splice(s.passengers.indexOf(v), 1);
        v.state = "lost";
        acctLevel().lost++; runLost++;
        if (v.role === "famous")
          addText(s.x, s.y - 48, FAMOUS[v.famousId].name + " WAS KILLED", "#ffd54f");
        addText(s.x, s.y - 34, "PASSENGER KILLED BY SABOTEUR", "#ff4081");
        dullThud();
        checkSectorClear();
      }
    }
  }
}

function contaminantAboard() {
  return ship.passengers.some(p => p.role === "saboteur" && !p.sleeper);
}

function killOid(o, how) {
  if (o.state === "dying") return;
  o.state = "dying"; o.deathType = how; o.deathT = 0;
  if (how === "torched") blip(220, 60, 0.5, "sawtooth", 0.15);
  else blip(400, 80, 0.25, "square", 0.12);
}

/* recovery bay (cyan) spans MERCY's underside and heals & delivers;
   the red quarantine bay hangs off her starboard side */
function mercyPos() {
  return { mx: level.mx + (level.mxo || 0), my: level.my + (level.myo || 0) };
}
function bayRects() {
  const { mx, my } = mercyPos();
  return {
    // recovery bay hangs under the hull, dead centre
    med: { x0: mx - 100, x1: mx + 100, y0: my + 24, y1: my + 130 },
    // quarantine comes off the starboard side, level with the hull itself —
    // kept apart, not underneath, on purpose
    red: { x0: mx + 172, x1: mx + 260, y0: my - 34, y1: my + 30 }
  };
}
function inBay(b) {
  const s = ship;
  return s.x > b.x0 && s.x < b.x1 && s.y > b.y0 && s.y < b.y1 &&
    Math.abs(s.vx) < 70 && Math.abs(s.vy) < 70 && !s.dead;
}

function updateDocking(dt) {
  if (level.isCave) return;   // no MERCY down in the Hollows
  const s = ship;
  const bays = bayRects();

  if (inBay(bays.med)) {
    if (!mercyBreach) {
      s.fuel = Math.min(100, s.fuel + 30 * dt);
      if (!mercyDamaged) {
        const rate = upgrades.lamp ? 40 : 24; // Nightingale runs a better ward
        s.vitals = Math.min(maxVitals(), s.vitals + rate * dt);
      }
    }
    s.dockT += dt;
    const deliverable = s.passengers.filter(p => p.role !== "saboteur");
    if (deliverable.length > 0 && s.dockT > 0.35) {
      s.dockT = 0; s.escapeT = 0;
      // famous Scions step out last, for the reveal
      deliverable.sort((a, b) => (a.role === "famous" ? 1 : 0) - (b.role === "famous" ? 1 : 0));
      const p = deliverable[0];
      s.passengers.splice(s.passengers.indexOf(p), 1);
      p.state = "delivered";
      level.delivered++; runSaved++;
      score += 300;
      addText(level.mx, level.my + 40, "DELIVERED +300", "#69f0ae");
      blip(520, 1040, 0.2, "sine", 0.12);
      if (p.carrier) {
        const frag = grantFragment(true);
        if (frag) addText(level.mx, level.my + 56, "LOG FRAGMENT RECOVERED", "#00e5ff");
      }
      if (p.role === "famous") {
        const f = FAMOUS[p.famousId];
        upgrades[f.upgrade] = true;
        codex.add(p.famousId); saveCodex();
        if (f.upgrade === "fabrica") s.vitals = Math.min(maxVitals(), s.vitals + 25);
        score += 1500;
        goldBurst(level.mx, level.my + 40);
        showCard({
          kicker: "RESCUED · +1500", title: f.name, subtitle: f.era,
          body: f.story + "\n\n★ " + f.upgradeName + " — " + f.upgradeDesc,
          color: "#ffd54f"
        });
        return;
      }
      checkSectorClear();
      return;
    }
    // only saboteurs left aboard: given the chance, one slips inside
    if (deliverable.length === 0 && s.passengers.length > 0) {
      s.escapeT += dt;
      if (s.escapeT > 1.2) {
        s.escapeT = 0;
        const sab = s.passengers.find(p => p.role === "saboteur");
        s.passengers.splice(s.passengers.indexOf(sab), 1);
        sab.state = "escaped";
        level.contained++; // off the manifest either way
        triggerBreach();
      }
    }
  } else { s.dockT = 0; s.escapeT = 0; }

  if (inBay(bays.red)) {
    s.redDockT += dt;
    const sab = s.passengers.find(p => p.role === "saboteur");
    if (sab && s.redDockT > 0.35) {
      s.redDockT = 0;
      s.passengers.splice(s.passengers.indexOf(sab), 1);
      sab.state = "contained";
      level.contained++; // accounted for, but not a casualty
      score += 750;
      addText(level.mx, level.my + 40, "CONTAMINANT CONTAINED +750", "#ff4081");
      explode(level.mx + 65, level.my + 60, "#ff4081", 14);
      blip(220, 660, 0.3, "square", 0.12);
      checkSectorClear();
    }
    if (mercyBreach) {
      s.breachDockT += dt;
      if (s.breachDockT > 2) { s.breachDockT = 0; resolveBreach(true); }
    }
  } else { s.breachDockT = 0; s.redDockT = 0; }
}

function updateBlackbox(dt) {
  const bb = level.blackbox;
  if (!bb || bb.found) return;
  const s = ship;
  if (s.landed && Math.abs(s.x - bb.x) < 70) {
    bb.scanT += dt;
    if (bb.scanT >= 1.5) {
      bb.found = true;
      blackboxCount++;
      score += 800;
      blip(300, 1200, 0.5, "sine", 0.14);
      const frag = grantFragment(false);
      showCard({
        kicker: "BLACK BOX RECOVERED · SIGNAL " + blackboxCount + "/" + NBOX + " · +800",
        title: "", subtitle: "",
        body: (frag || "The recorder is blank — wiped clean. Someone got here first.") +
          "\n\n" + (blackboxCount >= 3 ? "◈ Triangulation viable. Keep flying."
                                       : "◈ Recover at least 3 of " + NBOX + " to triangulate the source."),
        color: "#b388ff"
      });
    }
  } else bb.scanT = 0;
}

function updatePods() {
  const s = ship;
  for (const p of level.pods) {
    if (p.taken) continue;
    if (Math.hypot(s.x - p.x, s.y - (p.y - 8)) < 30) {
      p.taken = true;
      s.fuel = Math.min(100, s.fuel + 35);
      addText(p.x, p.y - 30, "FUEL +35", "#ffc400");
      blip(520, 780, 0.15, "sine", 0.1);
      goldBurst(p.x, p.y - 8);
    }
  }
  // the counterfeits: they drink instead of pour
  for (const p of level.fakePods) {
    if (p.taken) continue;
    if (Math.hypot(s.x - p.x, s.y - (p.y - 8)) < 30) {
      p.taken = true;
      s.fuel = Math.max(0, s.fuel - 18);
      score = Math.max(0, score - 100);
      addText(p.x, p.y - 30, "COUNTERFEIT — GLYCON'S LURE  -100", "#c6ff00");
      addText(p.x, p.y - 46, "FUEL DRAINED -18", "#ff4081");
      staticTick();
      explode(p.x, p.y - 8, "#c6ff00", 14);
    }
  }
}

/* A ship landed at 0 fuel has no way to move again — thrust and shield both
   require fuel>0, and nothing else can reach it. Holding THRUST while
   stranded is otherwise a dead input (thrusting itself needs fuel), so it
   doubles as the "signal for resupply" charge — no new button, no conflict
   with normal flight. A small drone drops just enough fuel to reach a real
   pod or MERCY; it's also just handy any time you're grounded and running on
   fumes, not only at the hard 0. */
const SIGNAL_HOLD_T = 1.8;
function updateResupplySignal(dt) {
  const s = ship;
  const stranded = s.landed && s.fuel <= 0 && !s.dead;
  if (stranded && !resupplyDrone && (input.thrust || pad.thrust)) {
    s.signalT += dt;
    if (Math.random() < dt * 8) particles.push({
      x: s.x + (Math.random() - 0.5) * 16, y: s.y - 6,
      vx: (Math.random() - 0.5) * 20, vy: -26, t: 0.3, max: 0.4,
      color: "#ffc400", size: 1.6 });
  } else if (!resupplyDrone) {
    s.signalT = Math.max(0, s.signalT - dt * 2.5);
  }
  if (s.signalT >= SIGNAL_HOLD_T && !resupplyDrone) {
    s.signalT = 0;
    resupplyDrone = { x: s.x, y: s.y - 320, phase: "in", t: 0 };
    blip(180, 420, 0.4, "sine", 0.12);
  }
  if (resupplyDrone) {
    const rd = resupplyDrone;
    rd.t += dt; rd.x = s.x;
    if (rd.phase === "in") {
      rd.y = lerp(s.y - 320, s.y - 34, clamp(rd.t / 1.1, 0, 1));
      if (rd.t >= 1.1) {
        s.fuel = Math.min(100, s.fuel + 40);
        addText(s.x, s.y - 46, "RESUPPLY +40", "#ffc400");
        goldBurst(s.x, s.y - 34);
        blip(520, 780, 0.2, "sine", 0.12);
        rd.phase = "out"; rd.t = 0;
      }
    } else {
      rd.y = lerp(s.y - 34, s.y - 320, clamp(rd.t / 0.8, 0, 1));
      if (rd.t >= 0.8) resupplyDrone = null;
    }
  }
}

/* ---- the secret lifts and what waits below ---- */
function updateLift(dt) {
  const L = level.lift;
  if (!L) return;
  if (mercyBreach || level.extraction) { L.holdT = 0; return; }
  const near = ship.landed && !ship.dead &&
    Math.abs(ship.x - L.x) < 46 && Math.abs((ship.y + SHIP_R) - L.y) < 24;
  if (!near) { L.holdT = 0; L.armed = true; return; }
  if (!L.armed) return;   // must lift off the pad once before it cycles again
  L.holdT += dt;
  if (L.holdT > 0.6 && !L.hinted) {
    L.hinted = true;
    addText(L.x, L.y - 44, "THE PAD RINGS HOLLOW…", "#b388ff");
    blip(180, 120, 0.3, "sine", 0.1);
  }
  if (L.holdT >= 2.4 && !liftTransit) {
    startLiftTransit(level.isCave ? "up" : "down", L);
  }
}

/* the lift used to cut straight to the new level; now it plays out a
   continuous descent/ascent across the cut — sink (or rise) out of view on
   the departure screen, fade to black, swap levels, then fade in with the
   same motion completing on the arrival screen. `sign` is the one thing that
   differs between directions: +1 sinks (down), -1 rises (up), and every
   phase just walks ship.y by 40 world px in that direction. */
const LIFT_SINK_T = 0.6, LIFT_FADE_T = 0.3, LIFT_SETTLE_T = 0.6, LIFT_OFFSET = 40;
function startLiftTransit(dir, L) {
  liftTransit = { dir, L, phase: "sink", t: 0, fade: 0, startY: ship.y, swapped: false };
  ship.vx = 0; ship.vy = 0;
  hydraulic(dir === "down");
}
function updateLiftTransit(dt) {
  const lt = liftTransit;
  const sign = lt.dir === "down" ? 1 : -1;
  lt.t += dt;
  if (lt.phase === "sink") {
    const p = clamp(lt.t / LIFT_SINK_T, 0, 1);
    ship.y = lt.startY + sign * p * LIFT_OFFSET;
    if (p >= 1) { lt.phase = "black"; lt.t = 0; }
  } else if (lt.phase === "black") {
    lt.fade = clamp(lt.t / LIFT_FADE_T, 0, 1);
    if (lt.fade >= 1 && !lt.swapped) {
      lt.swapped = true;
      if (lt.dir === "down") enterCave(lt.L); else exitCave();
      lt.restY = ship.y;
      ship.y = lt.restY - sign * LIFT_OFFSET;
      lt.t = 0; lt.phase = "reveal";
      hydraulic(lt.dir === "down");
    }
  } else if (lt.phase === "reveal") {
    lt.fade = 1 - clamp(lt.t / LIFT_FADE_T, 0, 1);
    if (lt.t >= LIFT_FADE_T) { lt.t = 0; lt.phase = "settle"; }
  } else if (lt.phase === "settle") {
    const p = clamp(lt.t / LIFT_SETTLE_T, 0, 1);
    ship.y = (lt.restY - sign * LIFT_OFFSET) + sign * p * LIFT_OFFSET;
    if (p >= 1) { ship.y = lt.restY; liftTransit = null; }
  }
}

function updateShrine(dt) {
  const sh = level.shrine;
  if (!sh || sh.found) return;
  if (ship.landed && Math.abs(ship.x - sh.x) < 80) {
    sh.scanT += dt;
    if (sh.scanT >= 2) {
      sh.found = true;
      shrines.add(level.caveIdx);
      score += 1000;
      let extra = "";
      if (shrines.size >= SHRINES.length) {
        score += 3000;
        extra = "\n\n★ GLYCON UNMASKED — the whole counterfeit laid bare. +3000";
      }
      const c = SHRINES[level.caveIdx];
      blip(300, 1200, 0.6, "sine", 0.14);
      staticTick();
      showCard({ kicker: c.kicker + " · SECRET +1000", title: c.title, subtitle: "",
        body: c.body + extra, color: c.color });
    }
  } else sh.scanT = 0;
}

function updateBeacon(dt) {
  const b = level.beacon;
  if (!b || b.resolved) return;
  const s = ship;
  if (s.landed && Math.abs(s.x - b.x) < 90) {
    b.silenceT += dt;
    if (b.silenceT >= 5) resolveBeacon("answered");
  } else b.silenceT = Math.max(0, b.silenceT - dt * 2);
}

function resolveBeacon(how) {
  const b = level.beacon;
  b.resolved = true;
  endingType = how;
  if (how === "fire") {
    score += 3000;
    explode(b.x, b.y - 40, "#b388ff", 80);
    explode(b.x, b.y - 20, "#ffc400", 50);
  } else {
    score += 6000;
    if (runFired === 0) score += 2000;
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: b.x, y: b.y - 40, vx: Math.cos(a) * 90, vy: Math.sin(a) * 90 - 30,
        t: 1 + Math.random(), max: 2, color: "#aef4ff", size: 2 });
    }
    blip(220, 880, 1.2, "sine", 0.15);
  }
  state = "ending"; stateT = 0;
}

/* ================= render ================= */

/* Bundle D2/D3 — perf: ctx.shadowBlur is extremely expensive per-draw-call;
   it may only appear on singletons drawn once per frame (ship, mothership,
   title text), never inside a per-entity or per-particle loop. Two cheap
   substitutes stand in for it:
   - glowSprite/drawGlow: a cached pre-rendered radial-gradient blob,
     drawImage'd under a point/icon instead of blurring it live.
   - glowStroke: a 2-pass stroke (soft wide + crisp normal) for per-entity
     line art (Scions, turrets, drones, lure-trees). */
const glowSpriteCache = new Map();
function glowSprite(color, r) {
  const rr = Math.max(2, Math.round(r));
